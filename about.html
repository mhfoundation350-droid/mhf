<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>আমাদের সম্পর্কে - মেঘনা হিউম্যানিটি ফাউন্ডেশন</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap');
    body { font-family: 'Noto Sans Bengali', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #166534 0%, #15803d 100%); }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Navbar -->
  <nav class="gradient-bg text-white p-4 sticky top-0 z-50 shadow-lg">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="text-xl md:text-2xl font-bold">MHF</h1>
      <div class="hidden md:flex gap-4">
        <a href="index.html" class="px-3 py-2 rounded hover:bg-white/20">হোম</a>
        <a href="about.html" class="px-3 py-2 rounded bg-white/30 font-bold">আমাদের সম্পর্কে</a>
        <a href="projects.html" class="px-3 py-2 rounded hover:bg-white/20">প্রজেক্ট</a>
        <a href="report.html" class="px-3 py-2 rounded hover:bg-white/20">রিপোর্ট</a>
        <a href="gallery.html" class="px-3 py-2 rounded hover:bg-white/20">গ্যালারি</a>
        <a href="contact.html" class="px-3 py-2 rounded hover:bg-white/20">যোগাযোগ</a>
      </div>
      <button id="menuBtn" class="md:hidden"><i class="fas fa-bars text-2xl"></i></button>
    </div>
    <div id="mobileMenu" class="hidden md:hidden mt-4 space-y-2">
      <a href="index.html" class="block py-2">হোম</a>
      <a href="about.html" class="block py-2 font-bold">আমাদের সম্পর্কে</a>
      <a href="projects.html" class="block py-2">প্রজেক্ট</a>
      <a href="report.html" class="block py-2">রিপোর্ট</a>
      <a href="gallery.html" class="block py-2">গ্যালারি</a>
      <a href="contact.html" class="block py-2">যোগাযোগ</a>
    </div>
  </nav>

  <!-- Header -->
  <div class="gradient-bg text-white py-16 text-center">
    <h2 class="text-5xl font-bold">আমাদের সম্পর্কে</h2>
    <p class="text-xl mt-4 opacity-90">মানবতার সেবায় আমরা অঙ্গীকারবদ্ধ</p>
  </div>

  <div class="container mx-auto px-4 py-16">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      
      <!-- কে আমরা? -->
      <div class="bg-white p-8 rounded-xl shadow-lg">
        <h3 class="text-2xl font-bold text-blue-700 mb-4 border-b-2 border-blue-200 pb-3">কে আমরা?</h3>
        <p class="text-gray-700 text-lg leading-relaxed" id="about_who">লোড হচ্ছে...</p>
      </div>

      <!-- আমাদের মিশন -->
      <div class="bg-white p-8 rounded-xl shadow-lg">
        <h3 class="text-2xl font-bold text-green-700 mb-4 border-b-2 border-green-200 pb-3">
          <i class="fas fa-bullseye mr-2"></i>আমাদের মিশন
        </h3>
        <p class="text-gray-700 text-lg leading-relaxed" id="about_mission">লোড হচ্ছে...</p>
      </div>

      <!-- আমাদের ভিশন -->
      <div class="bg-white p-8 rounded-xl shadow-lg">
        <h3 class="text-2xl font-bold text-purple-700 mb-4 border-b-2 border-purple-200 pb-3">
          <i class="fas fa-eye mr-2"></i>আমাদের ভিশন
        </h3>
        <p class="text-gray-700 text-lg leading-relaxed" id="about_vision">লোড হচ্ছে...</p>
      </div>

      <!-- আমাদের টিম -->
      <div class="bg-white p-8 rounded-xl shadow-lg">
        <h3 class="text-2xl font-bold text-orange-700 mb-4 border-b-2 border-orange-200 pb-3">
          <i class="fas fa-users mr-2"></i>আমাদের টিম
        </h3>
        <p class="text-gray-700 text-lg leading-relaxed" id="about_team">লোড হচ্ছে...</p>
      </div>

    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxM3ARqJFrR-joDhEFCLR91UJPkovun-U",
  authDomain: "mhf-foundation.firebaseapp.com",
  projectId: "mhf-foundation",
  storageBucket: "mhf-foundation.firebasestorage.app",
  messagingSenderId: "935003103652",
  appId: "1:935003103652:web:6bd9c4692553cd8c45e131"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Mobile Menu
document.getElementById('menuBtn').onclick = () => {
    document.getElementById('mobileMenu').classList.toggle('hidden');
}

// About Data লোড করো Firestore থেকে
async function loadAboutData() {
  try {
    const docRef = doc(db, "settings", "about");
    const docSnap = await getDoc(docRef);
    
    if (docSnap.exists()) {
      const data = docSnap.data();
      document.getElementById('about_who').textContent = data.who || 'তথ্য যোগ করা হয়নি';
      document.getElementById('about_mission').textContent = data.mission || 'তথ্য যোগ করা হয়নি';
      document.getElementById('about_vision').textContent = data.vision || 'তথ্য যোগ করা হয়নি';
      document.getElementById('about_team').textContent = data.team || 'তথ্য যোগ করা হয়নি';
    } else {
      console.log("about ডকুমেন্ট পাওয়া যায়নি!");
      document.getElementById('about_who').textContent = 'Admin Panel থেকে তথ্য যোগ করুন';
      document.getElementById('about_mission').textContent = 'Admin Panel থেকে তথ্য যোগ করুন';
      document.getElementById('about_vision').textContent = 'Admin Panel থেকে তথ্য যোগ করুন';
      document.getElementById('about_team').textContent = 'Admin Panel থেকে তথ্য যোগ করুন';
    }
  } catch (error) {
    console.log("About লোড Error:", error);
    document.getElementById('about_who').textContent = 'ডাটা লোড করতে সমস্যা হচ্ছে';
  }
}

loadAboutData();
</script>
</body>
</html>
