<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>আয়-ব্যয় রিপোর্ট - MHF</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
<nav class="bg-emerald-700 text-white shadow-lg sticky top-0 z-50">
  <div class="container mx-auto px-4 py-3 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <img src="images/logo.png" class="h-12 w-12 rounded-full bg-white p-1" onerror="this.src='https://ui-avatars.com/api/?name=MHF&background=10b981&color=fff'">
      <h1 class="text-xl font-bold">মেঘনা হিউম্যানিটি ফাউন্ডেশন</h1>
    </div>
    <div class="hidden md:flex gap-6">
      <a href="index.html" class="hover:text-yellow-300">হোম</a>
      <a href="projects.html" class="hover:text-yellow-300">প্রজেক্ট</a>
      <a href="medical-camp.html" class="hover:text-yellow-300">মেডিকেল ক্যাম্প</a>
      <a href="education.html" class="hover:text-yellow-300">শিক্ষা সহায়তা</a>
      <a href="report.html" class="text-yellow-300">আয়-ব্যয়</a>
      <a href="donate.html" class="bg-yellow-400 text-black px-4 py-2 rounded font-bold">দান করুন</a>
    </div>
  </div>
</nav>

<section class="py-12">
  <div class="container mx-auto px-4">
    <h2 class="text-4xl font-bold text-center mb-10 text-emerald-700">স্বচ্ছ আয়-ব্যয় হিসাব</h2>
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
      <div class="bg-green-600 text-white p-6 rounded-xl shadow-lg text-center">
        <h3 class="text-lg"><i class="fas fa-hand-holding-dollar"></i> মোট আয়</h3>
        <p class="text-3xl font-bold" id="totalIncome">0 টাকা</p>
      </div>
      <div class="bg-red-600 text-white p-6 rounded-xl shadow-lg text-center">
        <h3 class="text-lg"><i class="fas fa-money-bill-wave"></i> মোট ব্যয়</h3>
        <p class="text-3xl font-bold" id="totalExpense">0 টাকা</p>
      </div>
      <div class="bg-blue-600 text-white p-6 rounded-xl shadow-lg text-center">
        <h3 class="text-lg"><i class="fas fa-wallet"></i> বর্তমান ফান্ড</h3>
        <p class="text-3xl font-bold" id="currentCash">0 টাকা</p>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <div class="bg-white p-6 rounded-xl shadow-lg">
        <h3 class="text-2xl font-bold mb-4 text-green-700"><i class="fas fa-arrow-down"></i> সর্বশেষ দান</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-100">
              <tr><th class="p-2 text-left">দাতা</th><th class="p-2 text-left">পরিমাণ</th><th class="p-2 text-left">তারিখ</th></tr>
            </thead>
            <tbody id="donationTable"></tbody>
          </table>
        </div>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-lg">
        <h3 class="text-2xl font-bold mb-4 text-red-700"><i class="fas fa-arrow-up"></i> সর্বশেষ খরচ</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="bg-gray-100">
              <tr><th class="p-2 text-left">খাত</th><th class="p-2 text-left">পরিমাণ</th><th class="p-2 text-left">তারিখ</th></tr>
            </thead>
            <tbody id="expenseTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</section>

<footer class="bg-emerald-900 text-white py-8 mt-12">
  <div class="container mx-auto px-4 text-center">
    <p>© 2024 মেঘনা হিউম্যানিটি ফাউন্ডেশন। সর্বস্বত্ব সংরক্ষিত।</p>
  </div>
</footer>

<script>
async function loadReport() {
  let donations = await fetch('data/donations.json').then(r=>r.json());
  let expenses = await fetch('data/expenses.json').then(r=>r.json());
  
  let income = donations.reduce((sum,i) => sum + Number(i.amount||0), 0);
  let expense = expenses.reduce((sum,i) => sum + Number(i.amount||0), 0);
  document.getElementById('totalIncome').innerText = income.toLocaleString('bn-BD') + ' টাকা';
  document.getElementById('totalExpense').innerText = expense.toLocaleString('bn-BD') + ' টাকা';
  document.getElementById('currentCash').innerText = (income-expense).toLocaleString('bn-BD') + ' টাকা';

  let dHtml = '';
  donations.slice(-10).reverse().forEach(d => {
    dHtml += `<tr class="border-b"><td class="p-2">${d.name}</td><td class="p-2 font-bold text-green-600">${Number(d.amount).toLocaleString('bn-BD')}</td><td class="p-2">${d.date}</td></tr>`;
  });
  document.getElementById('donationTable').innerHTML = dHtml || '<tr><td colspan="3" class="p-2 text-center">কোনো দান নেই</td></tr>';

  let eHtml = '';
  expenses.slice(-10).reverse().forEach(e => {
    eHtml += `<tr class="border-b"><td class="p-2">${e.purpose}</td><td class="p-2 font-bold text-red-600">${Number(e.amount).toLocaleString('bn-BD')}</td><td class="p-2">${e.date}</td></tr>`;
  });
  document.getElementById('expenseTable').innerHTML = eHtml || '<tr><td colspan="3" class="p-2 text-center">কোনো খরচ নেই</td></tr>';
}
loadReport();
</script>
</body>
</html>
