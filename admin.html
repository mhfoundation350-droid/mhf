<!DOCTYPE html>

<p class="text-center text-sm mt-4 text-gray-500">Default Password: mhf2024</p>

<script>
function login(){
  if(document.getElementById('pass').value === 'mhf2024'){
    alert('Login সফল! এখন সদস্য যোগ করুন।');
    window.location.href = 'index.html'; 
  } else {
    alert('Password ভুল!');
  }
}
</script>
</body>
</html>
