<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MHF Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
  <div id="login" class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded shadow w-80">
      <h1 class="text-xl font-bold text-center mb-4">MHF Admin Login</h1>
      <input id="pass" type="password" placeholder="Password" class="w-full border p-2 mb-3">
      <button onclick="login()" class="w-full bg-blue-600 text-white p-2 rounded">লগইন</button>
      <p class="text-xs text-center mt-3">Password: mhf2024</p>
    </div>
  </div>

  <div id="panel" class="hidden p-6">
    <h1 class="text-2xl font-bold mb-4">লগইন সফল ✅</h1>
    <p>ভাই তুমি Admin প্যানেলে ঢুকে গেছো!</p>
    <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded mt-4">লগআউট</button>
  </div>

<script>
if(localStorage.getItem('login') === 'yes') showPanel();

function login() {
  if(document.getElementById('pass').value === 'mhf2024') {
    localStorage.setItem('login', 'yes');
    showPanel();
  } else {
    alert('পাসওয়ার্ড ভুল! mhf2024 লিখো');
  }
}

function showPanel() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('panel').classList.remove('hidden');
}

function logout() {
  localStorage.removeItem('login');
  location.reload();
}
</script>
</body>
</html>
