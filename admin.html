<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MHF Foundation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans Bengali',sans-serif}
        body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px}
     .login-box{max-width:400px;margin:100px auto;background:#fff;padding:40px;border-radius:15px;box-shadow:0 10px 40px rgba(0,0,0,.3)}
     .login-box h2{text-align:center;color:#1e40af;margin-bottom:30px}
     .form-group{margin-bottom:20px}
     .form-group label{display:block;margin-bottom:8px;font-weight:600;color:#334155}
     .form-group input,.form-group textarea,.form-group select{width:100%;padding:12px;border:2px solid #e2e8f0;border-radius:8px;font-size:14px}
     .form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:#1e40af}
     .btn{background:linear-gradient(135deg,#1e40af,#1e3a8a);color:#fff;padding:12px 30px;border:none;border-radius:8px;cursor:pointer;font-weight:600;width:100%;font-size:16px}
     .btn:hover{opacity:.9}
     .btn:disabled{opacity:.5;cursor:not-allowed}
     .btn-delete{background:#dc2626;padding:8px 15px;font-size:14px;width:auto}
     .dashboard{display:none;max-width:1200px;margin:0 auto}
     .header{background:#fff;padding:20px;border-radius:15px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 15px rgba(0,0,0,.1)}
     .header h1{color:#1e40af}
     .tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
     .tab{background:#fff;padding:12px 24px;border-radius:8px;cursor:pointer;font-weight:600;color:#64748b;transition:all.3s}
     .tab.active{background:#1e40af;color:#fff}
     .content{display:none;background:#fff;padding:30px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,.1)}
     .content.active{display:block}
     .content h3{color:#1e40af;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #e2e8f0}
     .item-list{margin-top:20px}
     .item{background:#f8fafc;padding:15px;border-radius:8px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
     .item-info{flex:1}
     .success-msg{background:#10b981;color:#fff;padding:12px;border-radius:8px;margin-bottom:15px;display:none}
     .error-msg{background:#ef4444;color:#fff;padding:12px;border-radius:8px;margin-bottom:15px;display:none}
     .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
        @media(max-width:768px){.grid-2{grid-template-columns:1fr}}
    </style>
</head>
<body>

<!-- Login -->
<div id="loginBox" class="login-box">
    <h2><i class="fas fa-lock"></i> Admin Login</h2>
    <div id="loginError" class="error-msg"></div>
    <div class="form-group">
        <label>Email:</label>
        <input type="email" id="email" placeholder="admin@mhf.com">
    </div>
    <div class="form-group">
        <label>Password:</label>
        <input type="password" id="password" placeholder="Enter password">
    </div>
    <button class="btn" onclick="login()">Login</button>
</div>

<!-- Dashboard -->
<div id="dashboard" class="dashboard">
    <div class="header">
        <h1><i class="fas fa-tachometer-alt"></i> MHF Admin Panel</h1>
        <button class="btn btn-delete" onclick="logout()">Logout</button>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('donation')">Donation</div>
        <div class="tab" onclick="showTab('contact')">Contact</div>
        <div class="tab" onclick="showTab('committee')">Committee</div>
        <div class="tab" onclick="showTab('gallery')">Gallery</div>
        <div class="tab" onclick="showTab('projects')">Projects</div>
        <div class="tab" onclick="showTab('about')">About</div>
    </div>

    <!-- Donation Tab -->
    <div id="donation" class="content active">
        <h3>ডোনেশন সেটিংস</h3>
        <div id="donSuccess" class="success-msg">সফলভাবে আপডেট হয়েছে!</div>
        <div class="grid-2">
            <div class="form-group"><label>বিকাশ:</label><input type="text" id="bkash" placeholder="01XXXXXXXXX"></div>
            <div class="form-group"><label>নগদ:</label><input type="text" id="nagad" placeholder="01XXXXXXXXX"></div>
        </div>
        <div class="form-group"><label>রকেট:</label><input type="text" id="rocket" placeholder="01XXXXXXXXX"></div>
        <hr style="margin: 20px 0;">
        <h4 style="margin-bottom: 15px;">ব্যাংক অ্যাকাউন্ট তথ্য</h4>
        <div class="form-group"><label>ব্যাংকের নাম:</label><input type="text" id="bank_name" placeholder="Dutch Bangla Bank"></div>
        <div class="grid-2">
            <div class="form-group"><label>অ্যাকাউন্ট নম্বর:</label><input type="text" id="bank_account" placeholder="1234567890"></div>
            <div class="form-group"><label>ব্রাঞ্চ:</label><input type="text" id="bank_branch" placeholder="কমলনগর ব্রাঞ্চ"></div>
        </div>
        <div class="form-group"><label>অ্যাকাউন্ট নাম:</label><input type="text" id="bank_holder" placeholder="Meghna Humanity Foundation"></div>
        <div class="form-group"><label>Swift Code:</label><input type="text" id="bank_swift" placeholder="SWIFT Code"></div>
        <button class="btn" onclick="saveDonation()">Firebase এ সেভ করুন</button>
    </div>

    <!-- Contact Tab -->
    <div id="contact" class="content">
        <h3>যোগাযোগ তথ্য</h3>
        <div id="conSuccess" class="success-msg">সফলভাবে আপডেট হয়েছে!</div>
        <div class="form-group"><label>ঠিকানা:</label><input type="text" id="address"></div>
        <div class="form-group"><label>ইমেইল:</label><input type="text" id="conEmail"></div>
        <div class="form-group"><label>বিকাশ:</label><input type="text" id="conBkash"></div>
        <div class="form-group"><label>Facebook URL:</label><input type="text" id="fb"></div>
        <div class="form-group"><label>YouTube URL:</label><input type="text" id="yt"></div>
        <button class="btn" onclick="saveContact()">Firebase এ সেভ করুন</button>
    </div>

    <!-- Committee Tab -->
    <div id="committee" class="content">
        <h3>কমিটি মেম্বার যোগ করুন</h3>
        <div class="form-group"><label>নাম:</label><input type="text" id="comName"></div>
        <div class="form-group"><label>পদবি:</label><input type="text" id="comPost"></div>
        <div class="grid-2">
            <div class="form-group"><label>মোবাইল:</label><input type="text" id="comPhone" placeholder="01XXXXXXXXX"></div>
            <div class="form-group">
                <label>রক্তের গ্রুপ:</label>
                <select id="comBlood">
                    <option value="">সিলেক্ট করুন</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>ছবি আপলোড করুন:</label>
            <input type="file" id="comImageFile" accept="image/*" style="padding: 8px;">
            <p id="uploadStatus" style="font-size: 12px; color: #059669; margin-top: 5px;"></p>
            <img id="imagePreview" style="display:none; width:100px; height:100px; object-fit:cover; border-radius:50%; margin-top:10px; border:2px solid #1e40af;">
        </div>
        <button class="btn" id="addCommitteeBtn" onclick="addCommittee()">যোগ করুন</button>
        <div id="committeeList" class="item-list"></div>
    </div>

    <!-- Gallery Tab -->
    <div id="gallery" class="content">
        <h3>গ্যালারিতে ছবি যোগ করুন</h3>
        <div class="form-group"><label>ছবির টাইটেল:</label><input type="text" id="galTitle"></div>
        <div class="form-group"><label>ছবি আপলোড:</label><input type="file" id="galImageFile" accept="image/*" style="padding: 8px;"></div>
        <button class="btn" id="addGalleryBtn" onclick="addGallery()">যোগ করুন</button>
        <div id="galleryList" class="item-list"></div>
    </div>

    <!-- Projects Tab -->
    <div id="projects" class="content">
        <h3>প্রজেক্ট যোগ করুন</h3>
        <div class="form-group"><label>প্রজেক্টের নাম:</label><input type="text" id="projName"></div>
        <div class="form-group"><label>বিবরণ:</label><textarea id="projDesc"></textarea></div>
        <div class="grid-2">
            <div class="form-group"><label>ছবি আপলোড:</label><input type="file" id="projImageFile" accept="image/*" style="padding: 8px;"></div>
            <div class="form-group">
                <label>স্ট্যাটাস:</label>
                <select id="projStatus">
                    <option value="চলমান">চলমান</option>
                    <option value="সম্পন্ন">সম্পন্ন</option>
                </select>
            </div>
        <button class="btn" id="addProjectBtn" onclick="addProject()">যোগ করুন</button>
        <div id="projectsList" class="item-list"></div>
    </div>

    <!-- About Tab -->
    <div id="about" class="content">
        <h3>আমাদের সম্পর্কে সেটিংস</h3>
        <div class="form-group"><label>কে আমরা?</label><textarea id="aboutWho"></textarea></div>
        <div class="form-group"><label>আমাদের মিশন</label><textarea id="aboutMission"></textarea></div>
        <div class="form-group"><label>আমাদের ভিশন</label><textarea id="aboutVision"></textarea></div>
        <div class="form-group"><label>আমাদের টিম</label><textarea id="aboutTeam"></textarea></div>
        <button class="btn" onclick="saveAbout()">Firebase এ সেভ করুন</button>
    </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, deleteDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

const firebaseConfig = {
  apiKey: "AIzaSyBxM3ARqJFrR-joDhEFCLR91UJPkovun-U",
  authDomain: "mhf-foundation.firebaseapp.com",
  projectId: "mhf-foundation",
  storageBucket: "mhf-foundation.firebasestorage.app",
  messagingSenderId: "935003103652",
  appId: "1:935003103652:web:52e57da27fccf37c45e131"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);
window.auth = auth;
window.db = db;
window.storage = storage;
window.firestore = { doc, setDoc, getDoc, collection, addDoc, getDocs, deleteDoc, serverTimestamp };
window.storageFuncs = { storageRef, uploadBytes, getDownloadURL };

onAuthStateChanged(auth, async (user) => {
  if (user) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    await loadAllData();
  } else {
    document.getElementById('loginBox').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
  }
});

window.login = async () => {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  document.getElementById('loginError').style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch(error) {
    document.getElementById('loginError').textContent = 'লগইন ফেইল: ' + error.message;
    document.getElementById('loginError').style.display = 'block';
  }
}

window.logout = async () => {
  await signOut(auth);
}

window.showTab = (tabName) => {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tabName).classList.add('active');
}

async function loadAllData() {
  const { doc, getDoc } = window.firestore;

  const don = await getDoc(doc(window.db, "settings", "donation"));
  if(don.exists()) {
    let d = don.data();
    document.getElementById('bkash').value = d.bkash || '';
    document.getElementById('nagad').value = d.nagad || '';
    document.getElementById('rocket').value = d.rocket || '';
    document.getElementById('bank_name').value = d.bank_name || '';
    document.getElementById('bank_account').value = d.bank_account || '';
    document.getElementById('bank_branch').value = d.bank_branch || '';
    document.getElementById('bank_holder').value = d.bank_holder || '';
    document.getElementById('bank_swift').value = d.bank_swift || '';
  }

  const con = await getDoc(doc(window.db, "settings", "contact"));
  if(con.exists()) {
    let c = con.data();
    document.getElementById('address').value = c.address || '';
    document.getElementById('conEmail').value = c.email || '';
    document.getElementById('conBkash').value = c.bkash || '';
    document.getElementById('fb').value = c.fb || '';
    document.getElementById('yt').value = c.yt || '';
  }

  const about = await getDoc(doc(window.db, "settings", "about"));
  if(about.exists()) {
    let a = about.data();
    document.getElementById('aboutWho').value = a.who || '';
    document.getElementById('aboutMission').value = a.mission || '';
    document.getElementById('aboutVision').value = a.vision || '';
    document.getElementById('aboutTeam').value = a.team || '';
  }

  loadCommittee();
  loadGallery();
  loadProjects();
}

window.saveDonation = async () => {
  const { doc, setDoc } = window.firestore;
  try {
    await setDoc(doc(window.db, "settings", "donation"), {
      bkash: document.getElementById('bkash').value,
      nagad: document.getElementById('nagad').value,
      rocket: document.getElementById('rocket').value,
      bank_name: document.getElementById('bank_name').value,
      bank_account: document.getElementById('bank_account').value,
      bank_branch: document.getElementById('bank_branch').value,
      bank_holder: document.getElementById('bank_holder').value,
      bank_swift: document.getElementById('bank_swift').value
    });
    document.getElementById('donSuccess').style.display = 'block';
    setTimeout(() => document.getElementById('donSuccess').style.display = 'none', 3000);
  } catch(e) {
    console.error('Error:', e);
    alert('Error: ' + e.message);
  }
}

window.saveContact = async () => {
  const { doc, setDoc } = window.firestore;
  try {
    await setDoc(doc(window.db, "settings", "contact"), {
      address: document.getElementById('address').value,
      email: document.getElementById('conEmail').value,
      bkash: document.getElementById('conBkash').value,
      fb: document.getElementById('fb').value,
      yt: document.getElementById('yt').value
    });
    document.getElementById('conSuccess').style.display = 'block';
    setTimeout(() => document.getElementById('conSuccess').style.display = 'none', 3000);
  } catch(e) {
    console.error('Error:', e);
    alert('Error: ' + e.message);
  }
}

window.saveAbout = async () => {
  const { doc, setDoc } = window.firestore;
  try {
    await setDoc(doc(window.db, "settings", "about"), {
      who: document.getElementById('aboutWho').value,
      mission: document.getElementById('aboutMission').value,
      vision: document.getElementById('aboutVision').value,
      team: document.getElementById('aboutTeam').value
    });
    alert('Firebase এ সেভ হয়েছে! ✅');
  } catch(e) {
    console.error('Error:', e);
    alert('Error: ' + e.message);
  }
}

window.addCommittee = async () => {
  const { collection, addDoc, serverTimestamp } = window.firestore;
  const { storageRef, uploadBytes, getDownloadURL } = window.storageFuncs;

  const name = document.getElementById('comName').value;
  const post = document.getElementById('comPost').value;
  const phone = document.getElementById('comPhone').value;
  const blood = document.getElementById('comBlood').value;
  const file = document.getElementById('comImageFile').files[0];

  if(!name ||!post ||!phone ||!file) {
    alert('নাম, পদবি, মোবাইল এবং ছবি আবশ্যক!');
    return;
  }

  document.getElementById('addCommitteeBtn').disabled = true;
  document.getElementById('addCommitteeBtn').textContent = 'আপলোড হচ্ছে...';
  document.getElementById('uploadStatus').textContent = 'ছবি আপলোড হচ্ছে...';

  try {
    const imageRef = storageRef(window.storage, `committee/${Date.now()}_${file.name}`);
    await uploadBytes(imageRef, file);
    const imageUrl = await getDownloadURL(imageRef);

    document.getElementById('uploadStatus').textContent = 'ডাটাবেসে সেভ হচ্ছে...';

    await addDoc(collection(window.db, "committee"), {
      name: name,
      post: post,
      phone: phone,
      blood: blood,
      image: imageUrl,
      timestamp: serverTimestamp()
    });

    loadCommittee();
    document.getElementById('comName').value = '';
    document.getElementById('comPost').value = '';
    document.getElementById('comPhone').value = '';
    document.getElementById('comBlood').value = '';
    document.getElementById('comImageFile').value = '';
    document.getElementById('imagePreview').style.display = 'none';
    document.getElementById('uploadStatus').textContent = '';
    alert('মেম্বার যোগ হয়েছে! ✅');
  } catch(e) {
    console.error('Error:', e);
    alert('Error: ' + e.message);
  } finally {
    document.getElementById('addCommitteeBtn').disabled = false;
    document.getElementById('addCommitteeBtn').textContent = 'যোগ করুন';
  }
}

document.getElementById('comImageFile').onchange = (e) => {
  const file = e.target.files[0];
  if(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('imagePreview').src = e.target.result;
      document.getElementById('imagePreview').style.display = 'block';
    }
    reader.readAsDataURL(file);
  }
}

window.addGallery = async () => {
  const { collection, addDoc, serverTimestamp } = window.firestore;
  const { storageRef, uploadBytes, getDownloadURL } = window.storageFuncs;
  const title = document.getElementById('galTitle').value;
  const file = document.getElementById('galImageFile').files[0];
  if(!title ||!file) return alert('সব তথ্য দিন!');

  document.getElementById('addGalleryBtn').disabled = true;
  document.getElementById('addGalleryBtn').textContent = 'আপলোড হচ্ছে...';

  try {
    const imageRef = storageRef(window.storage, `gallery/${Date.now()}_${file.name}`);
    await uploadBytes(imageRef, file);
    const imageUrl = await getDownloadURL(imageRef);

    await addDoc(collection(window.db, "gallery"), { title, image: imageUrl, timestamp: serverTimestamp() });
    loadGallery();
    document.getElementById('galTitle').value = '';
    document.getElementById('galImageFile').value = '';
    alert('গ্যালারি ছবি যোগ হয়েছে! ✅');
  } catch(e) {
    alert('Error: ' + e.message);
  } finally {
    document.getElementById('addGalleryBtn').disabled = false;
    document.getElementById('addGalleryBtn').textContent = 'যোগ করুন';
  }
}

window.addProject = async () => {
  const { collection, addDoc, serverTimestamp } = window.firestore;
  const { storageRef, uploadBytes, getDownloadURL } = window.storageFuncs;
  const name = document.getElementById('projName').value;
  const desc = document.getElementById('projDesc').value;
  const status = document.getElementById('projStatus').value;
  const file = document.getElementById('projImageFile').files[0];
  if(!name ||!desc ||!file) return alert('সব তথ্য দিন!');

  document.getElementById('addProjectBtn').disabled = true;
  document.getElementById('addProjectBtn').textContent = 'আপলোড হচ্ছে...';

  try {
    const imageRef = storageRef(window.storage, `projects/${Date.now()}_${file.name}`);
    await uploadBytes(imageRef, file);
    const imageUrl = await getDownloadURL(imageRef);

    await addDoc(collection(window.db, "projects"), { name, desc, image: imageUrl, status, timestamp: serverTimestamp() });
    loadProjects();
    document.getElementById('projName').value = '';
    document.getElementById('projDesc').value = '';
    document.getElementById('projImageFile').value = '';
    alert('প্রজেক্ট যোগ হয়েছে! ✅');
  } catch(e) {
    alert('Error: ' + e.message);
  } finally {
    document.getElementById('addProjectBtn').disabled = false;
    document.getElementById('addProjectBtn').textContent = 'যোগ করুন';
  }
}

async function loadCommittee() {
  const { collection, getDocs } = window.firestore;
  try {
    const snap = await getDocs(collection(window.db, "committee"));
    let html = '';
    snap.forEach(d => {
      let item = d.data();
      html += `<div class="item">
        <div style="display:flex; align-items:center; gap:10px; flex:1;">
          <img src="${item.image}" style="width:50px; height:50px; border-radius:50%; object-fit:cover;">
          <div class="item-info">
            <b>${item.name}</b> - ${item.post}<br>
            <small><i class="fas fa-phone"></i> ${item.phone} ${item.blood? `| <span style="color:#dc2626;">🩸 ${item.blood}</span>` : ''}</small>
          </div>
        <button class="btn btn-delete" onclick="deleteItem('committee','${d.id}')">ডিলিট</button>
      </div>`;
    });
    document.getElementById('committeeList').innerHTML = html;
  } catch(e) { console.error(e); }
}

async function loadGallery() {
  const { collection, getDocs } = window.firestore;
  try {
    const snap = await getDocs(collection(window.db, "gallery"));
    let html = '';
    snap.forEach(d => {
      let item = d.data();
      html += `<div class="item">
        <div style="display:flex; align-items:center; gap:10px; flex:1;">
          <img src="${item.image}" style="width:60px; height:60px; object-fit:cover; border-radius:8px;">
          <div class="item-info"><b>${item.title}</b></div>
        </div>
        <button class="btn btn-delete" onclick="deleteItem('gallery','${d.id}')">ডিলিট</button>
      </div>`;
    });
    document.getElementById('galleryList').innerHTML = html;
  } catch(e) { console.error(e); }
}

async function loadProjects() {
  const { collection, getDocs } = window.firestore;
  try {
    const snap = await getDocs(collection(window.db, "projects"));
    let html = '';
    snap.forEach(d => {
      let item = d.data();
      html += `<div class="item">
        <div style="display:flex; align-items:center; gap:10px; flex:1;">
          <img src="${item.image}" style="width:60px; height:60px; object-fit:cover; border-radius:8px;">
          <div class="item-info"><b>${item.name}</b> - ${item.status}</div>
        </div>
        <button class="btn btn-delete" onclick="deleteItem('projects','${d.id}')">ডিলিট</button>
      </div>`;
    });
    document.getElementById('projectsList').innerHTML = html;
  } catch(e) { console.error(e); }
}

window.deleteItem = async (col, id) => {
  if(confirm('ডিলিট করবেন?')) {
    const { doc, deleteDoc } = window.firestore;
    await deleteDoc(doc(window.db, col, id));
    if(col === 'committee') loadCommittee();
    if(col === 'gallery') loadGallery();
    if(col === 'projects') loadProjects();
  }
}
</script>

</body>
</html>
