<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MHF Admin Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:'Hind Siliguri',sans-serif}</style>
</head>
<body class="bg-gray-100">

<div id="login" class="min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow-md w-96">
    <h1 class="text-2xl font-bold text-center mb-6">মেঘনা হিউম্যানিটি ফাউন্ডেশন</h1>
    <input id="pass" type="password" placeholder="পাসওয়ার্ড দিন" class="w-full border p-3 rounded mb-4">
    <button onclick="checkLogin()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">লগইন</button>
    <p class="text-xs text-center mt-4 text-gray-500">Default: mhf2024</p>
  </div>
</div>

<div id="panel" class="hidden">
  <div class="bg-blue-800 text-white p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold">MHF Admin Dashboard</h1>
    <button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">লগআউট</button>
  </div>

  <div class="p-4 md:p-6">
    <div class="bg-yellow-100 border-l-4 border-yellow-500 p-4 mb-6">
      <p class="font-bold">GitHub Token দিন:</p>
      <input id="token" type="password" placeholder="ghp_xxxxxxxx" class="border p-2 rounded w-full mt-2">
      <button onclick="saveToken()" class="bg-green-600 text-white px-4 py-2 rounded mt-2">সেভ করুন</button>
      <p class="text-sm mt-1">Token ছাড়া ডাটা সেভ হবে না। <a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank" class="text-blue-600">নতুন Token বানান</a></p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-green-500 text-white p-6 rounded-lg">
        <h3 class="text-lg">মোট আয়</h3>
        <p class="text-3xl font-bold" id="totalIncome">0 টাকা</p>
      </div>
      <div class="bg-red-500 text-white p-6 rounded-lg">
        <h3 class="text-lg">মোট ব্যয়</h3>
        <p class="text-3xl font-bold" id="totalExpense">0 টাকা</p>
      </div>
      <div class="bg-blue-500 text-white p-6 rounded-lg">
        <h3 class="text-lg">বর্তমান ক্যাশ</h3>
        <p class="text-3xl font-bold" id="currentCash">0 টাকা</p>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow">
      <div class="flex border-b overflow-x-auto">
        <button onclick="showTab('donation', this)" class="tab-btn p-4 font-bold border-b-2 border-blue-600">দান ম্যানেজ</button>
        <button onclick="showTab('expense', this)" class="tab-btn p-4">খরচ ম্যানেজ</button>
        <button onclick="showTab('project', this)" class="tab-btn p-4">প্রজেক্ট</button>
        <button onclick="showTab('setting', this)" class="tab-btn p-4">সেটিংস</button>
      </div>

      <div id="donation" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-4">নতুন দান যোগ করুন</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <input id="d_name" placeholder="দাতার নাম" class="border p-2 rounded">
          <input id="d_amount" type="number" placeholder="টাকার পরিমাণ" class="border p-2 rounded">
          <input id="d_date" type="date" class="border p-2 rounded">
          <input id="d_receipt" placeholder="রশিদ নং" class="border p-2 rounded">
        </div>
        <button onclick="addData('donations')" class="bg-green-600 text-white px-6 py-2 rounded">দান যোগ করুন</button>
        <h3 class="text-lg font-bold mt-6 mb-2">সকল দান</h3>
        <div id="donationList" class="overflow-x-auto"></div>
      </div>

      <div id="expense" class="tab-content p-4 hidden">
        <h2 class="text-xl font-bold mb-4">নতুন খরচ যোগ করুন</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
          <input id="e_purpose" placeholder="খরচের খাত: ফ্রি মেডিকেল ক্যাম্প" class="border p-2 rounded">
          <input id="e_amount" type="number" placeholder="টাকার পরিমাণ" class="border p-2 rounded">
          <input id="e_date" type="date" class="border p-2 rounded">
          <input id="e_voucher" placeholder="ভাউচার নং" class="border p-2 rounded">
        </div>
        <button onclick="addData('expenses')" class="bg-red-600 text-white px-6 py-2 rounded">খরচ যোগ করুন</button>
        <h3 class="text-lg font-bold mt-6 mb-2">সকল খরচ</h3>
        <div id="expenseList" class="overflow-x-auto"></div>
      </div><div id="project" class="tab-content p-4 hidden">
        <h2 class="text-xl font-bold mb-4">নতুন প্রজেক্ট যোগ করুন</h2>
        <div class="grid grid-cols-1 gap-4 mb-4">
          <input id="p_title" placeholder="প্রজেক্ট: স্কুল শিক্ষা সহায়তা" class="border p-2 rounded">
          <textarea id="p_details" placeholder="বিস্তারিত" class="border p-2 rounded"></textarea>
          <input id="p_target" type="number" placeholder="টার্গেট টাকা" class="border p-2 rounded">
          <select id="p_status" class="border p-2 rounded">
            <option>চলমান</option>
            <option>সম্পন্ন</option>
            <option>আসন্ন</option>
          </select>
        </div>
        <button onclick="addData('projects')" class="bg-blue-600 text-white px-6 py-2 rounded">প্রজেক্ট যোগ করুন</button>
        <h3 class="text-lg font-bold mt-6 mb-2">সকল প্রজেক্ট</h3>
        <div id="projectList" class="overflow-x-auto"></div>
      </div>

      <div id="setting" class="tab-content p-4 hidden">
        <h2 class="text-xl font-bold mb-4">ওয়েবসাইট সেটিংস</h2>
        <div class="grid grid-cols-1 gap-4 mb-4">
          <input id="s_name" placeholder="ফাউন্ডেশনের নাম" class="border p-2 rounded">
          <input id="s_bkash" placeholder="বিকাশ নাম্বার" class="border p-2 rounded">
          <input id="s_nagad" placeholder="নগদ নাম্বার" class="border p-2 rounded">
          <input id="s_address" placeholder="ঠিকানা" class="border p-2 rounded">
        </div>
        <button onclick="saveSettings()" class="bg-gray-800 text-white px-6 py-2 rounded">সেটিংস সেভ করুন</button>
      </div>

    </div>
  </div>
</div>

<script>
const REPO = 'mhfoundation350-droid/mhf';
const BRANCH = 'main';
let TOKEN = localStorage.getItem('mhf_token') || '';

if(localStorage.getItem('mhf_logged') === 'true') showPanel();
if(TOKEN) document.getElementById('token').value = TOKEN;

function checkLogin() {
  if(document.getElementById('pass').value === 'mhf2024') {
    localStorage.setItem('mhf_logged', 'true');
    showPanel();
  } else alert('ভুল পাসওয়ার্ড!');
}

function showPanel() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('panel').classList.remove('hidden');
  loadAllData();
}

function logout() {
  localStorage.removeItem('mhf_logged');
  location.reload();
}

function saveToken() {
  TOKEN = document.getElementById('token').value;
  localStorage.setItem('mhf_token', TOKEN);
  alert('Token সেভ হয়েছে!');
  loadAllData();
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('border-blue-600', 'font-bold'));
  document.getElementById(tab).classList.remove('hidden');
  btn.classList.add('border-blue-600', 'font-bold');
}

async function getFile(file) {
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/data/${file}.json?ref=${BRANCH}`, {
    headers: { 'Authorization': `token ${TOKEN}` }
  });
  const data = await res.json();
  return { content: JSON.parse(atob(data.content)), sha: data.sha };
}async function updateFile(file, content, sha) {
  const res = await fetch(`https://api.github.com/repos/${REPO}/contents/data/${file}.json`, {
    method: 'PUT',
    headers: { 'Authorization': `token ${TOKEN}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({
      message: `Update ${file} from Admin`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2)))),
      sha: sha,
      branch: BRANCH
    })
  });
  if(!res.ok) throw new Error('GitHub API Error');
}

async function loadAllData() {
  if(!TOKEN) return;
  try {
    const donations = await getFile('donations');
    const expenses = await getFile('expenses');
    const projects = await getFile('projects');
    const settings = await getFile('settings');
    
    const totalIncome = donations.content.reduce((sum, d) => sum + Number(d.amount || 0), 0);
    const totalExpense = expenses.content.reduce((sum, e) => sum + Number(e.amount || 0), 0);
    document.getElementById('totalIncome').innerText = totalIncome.toLocaleString('bn-BD') + ' টাকা';
    document.getElementById('totalExpense').innerText = totalExpense.toLocaleString('bn-BD') + ' টাকা';
    document.getElementById('currentCash').innerText = (totalIncome - totalExpense).toLocaleString('bn-BD') + ' টাকা';

    renderList('donations', donations.content);
    renderList('expenses', expenses.content);
    renderList('projects', projects.content);
    
    document.getElementById('s_name').value = settings.content.name || '';
    document.getElementById('s_bkash').value = settings.content.bkash || '';
    document.getElementById('s_nagad').value = settings.content.nagad || '';
    document.getElementById('s_address').value = settings.content.address || '';
  } catch(e) { 
    console.log(e);
    alert('ডাটা লোড করতে সমস্যা। Token চেক করুন।');
  }
}

function renderList(type, data) {
  let html = '<table class="w-full border text-sm"><thead class
