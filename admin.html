<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MHF Admin - Full Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
.tab-content { display: none; }
.tab-content.active { display: block; }
.tab-btn.active { background: #1e40af; color: white; }
  </style>
</head>
<body class="bg-gray-100">

<div id="loginBox" class="min-h-screen flex items-center justify-center">
  <div class="bg-white p-8 rounded-lg shadow w-96">
    <h1 class="text-2xl font-bold text-center mb-6">মেঘনা হিউম্যানিটি ফাউন্ডেশন</h1>
    <input id="passInput" type="password" placeholder="পাসওয়ার্ড দিন" class="w-full border p-3 rounded mb-4">
    <button onclick="doLogin()" class="w-full bg-blue-600 text-white p-3 rounded font-bold">লগইন</button>
    <p id="msg" class="text-center mt-2 text-red-500"></p>
  </div>
</div>

<div id="dashboard" style="display:none">
  <div class="bg-blue-900 text-white p-4 flex justify-between items-center">
    <h1 class="text-xl font-bold"><i class="fas fa-shield-halved"></i> MHF অ্যাডমিন প্যানেল</h1>
    <button onclick="doLogout()" class="bg-red-500 px-4 py-2 rounded"><i class="fas fa-sign-out-alt"></i> লগআউট</button>
  </div>

  <div class="p-4">
    <div class="bg-yellow-100 border-l-4 border-yellow-500 p-4 mb-6">
      <p class="font-bold">GitHub Token: <span id="tokenStatus" class="text-red-600 text-sm">সেট করা নেই</span></p>
      <input id="tokenInput" type="password" placeholder="ghp_xxxxxxxx" class="border p-2 rounded w-full mt-2">
      <button onclick="saveToken()" class="bg-green-600 text-white px-4 py-2 rounded mt-2">সেভ করুন</button>
      <a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank" class="text-blue-600 underline text-sm ml-2">নতুন Token</a>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-green-600 text-white p-6 rounded-lg">
        <h3 class="text-lg"><i class="fas fa-hand-holding-dollar"></i> মোট আয়</h3>
        <p class="text-3xl font-bold" id="totalIncome">0 টাকা</p>
      </div>
      <div class="bg-red-600 text-white p-6 rounded-lg">
        <h3 class="text-lg"><i class="fas fa-money-bill-wave"></i> মোট ব্যয়</h3>
        <p class="text-3xl font-bold" id="totalExpense">0 টাকা</p>
      </div>
      <div class="bg-blue-600 text-white p-6 rounded-lg">
        <h3 class="text-lg"><i class="fas fa-wallet"></i> বর্তমান ক্যাশ</h3>
        <p class="text-3xl font-bold" id="currentCash">0 টাকা</p>
      </div>
      <div class="bg-purple-600 text-white p-6 rounded-lg">
        <h3 class="text-lg"><i class="fas fa-diagram-project"></i> মোট প্রজেক্ট</h3>
        <p class="text-3xl font-bold" id="totalProject">0 টি</p>
      </div>
    </div>

    <div class="bg-white rounded shadow mb-6">
      <div class="flex border-b overflow-x-auto">
        <button onclick="showTab('donations')" class="tab-btn px-4 py-3 font-bold active"><i class="fas fa-donate"></i> দান</button>
        <button onclick="showTab('expenses')" class="tab-btn px-4 py-3 font-bold"><i class="fas fa-receipt"></i> খরচ</button>
        <button onclick="showTab('projects')" class="tab-btn px-4 py-3 font-bold"><i class="fas fa-list-check"></i> প্রজেক্ট</button>
        <button onclick="showTab('events')" class="tab-btn px-4 py-3 font-bold"><i class="fas fa-calendar"></i> ইভেন্ট</button>
        <button onclick="showTab('members')" class="tab-btn px-4 py-3 font-bold"><i class="fas fa-users"></i> সদস্য</button>
        <button onclick="showTab('gallery')" class="tab-btn px-4 py-3 font-bold"><i class="fas fa-images"></i> গ্যালারি</button>
        <button onclick="showTab('news')" class="tab-btn px-4 py-3 font-bold"><i class="fas fa-newspaper"></i> নিউজ</button>
        <button onclick="showTab('settings')" class="tab-btn px-4 py-3 font-bold"><i class="fas fa-cog"></i> সেটিংস</button>
      </div>

      <!-- দান -->
      <div id="donations" class="tab-content active p-4">
        <h2 class="text-xl font-bold mb-4">দান ম্যানেজ</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-3">
          <input id="dName" placeholder="দাতার নাম" class="border p-2 rounded">
          <input id="dAmount" type="number" placeholder="টাকার পরিমাণ" class="border p-2 rounded">
          <input id="dDate" type="date" class="border p-2 rounded">
          <input id="dReceipt" placeholder="রশিদ নং" class="border p-2 rounded">
          <input id="dPhone" placeholder="ফোন নম্বর" class="border p-2 rounded">
          <input id="dAddress" placeholder="ঠিকানা" class="border p-2 rounded">
        </div>
        <button onclick="addItem('donations')" class="bg-green-600 text-white px-6 py-2 rounded mb-4">দান যোগ করুন</button>
        <div id="donationsList"></div>
      </div>

      <!-- খরচ -->
      <div id="expenses" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-4">খরচ ম্যানেজ</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-3">
          <input id="ePurpose" placeholder="খরচের খাত" class="border p-2 rounded">
          <input id="eAmount" type="number" placeholder="টাকার পরিমাণ" class="border p-2 rounded">
          <input id="eDate" type="date" class="border p-2 rounded">
          <input id="eVoucher" placeholder="ভাউচার নং" class="border p-2 rounded">
          <select id="eProject" class="border p-2 rounded"><option value="">প্রজেক্ট সিলেক্ট</option></select>
          <input id="eDetails" placeholder="বিস্তারিত" class="border p-2 rounded">
        </div>
        <button onclick="addItem('expenses')" class="bg-red-600 text-white px-6 py-2 rounded mb-4">খরচ যোগ করুন</button>
        <div id="expensesList"></div>
      </div>

      <!-- প্রজেক্ট -->
      <div id="projects" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-4">প্রজেক্ট ম্যানেজ</h2>
        <div class="grid grid-cols-1 gap-2 mb-3">
          <input id="pTitle" placeholder="প্রজেক্টের নাম - যেমন: ফ্রি মেডিকেল ক্যাম্প" class="border p-2 rounded">
          <textarea id="pDetails" placeholder="বিস্তারিত বিবরণ" class="border p-2 rounded"></textarea>
          <input id="pTarget" type="number" placeholder="টার্গেট টাকা" class="border p-2 rounded">
          <input id="pImage" placeholder="ছবির লিংক" class="border p-2 rounded">
          <select id="pStatus" class="border p-2 rounded">
            <option value="চলমান">চলমান</option>
            <option value="সম্পন্ন">সম্পন্ন</option>
            <option value="পরিকল্পিত">পরিকল্পিত</option>
          </select>
        </div>
        <button onclick="addItem('projects')" class="bg-blue-600 text-white px-6 py-2 rounded mb-4">প্রজেক্ট যোগ করুন</button>
        <div id="projectsList"></div>
      </div>

      <!-- ইভেন্ট -->
      <div id="events" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-4">ইভেন্ট ম্যানেজ</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3">
          <input id="evTitle" placeholder="ইভেন্টের নাম" class="border p-2 rounded">
          <input id="evDate" type="date" class="border p-2 rounded">
          <input id="evLocation" placeholder="স্থান" class="border p-2 rounded">
          <input id="evImage" placeholder="ছবির লিংক" class="border p-2 rounded">
          <textarea id="evDetails" placeholder="বিস্তারিত" class="border p-2 rounded md:col-span-2"></textarea>
        </div>
        <button onclick="addItem('events')" class="bg-orange-600 text-white px-6 py-2 rounded mb-4">ইভেন্ট যোগ করুন</button>
        <div id="eventsList"></div>
      </div>

      <!-- সদস্য -->
      <div id="members" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-4">সদস্য ম্যানেজ</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-2 mb-3">
          <input id="mName" placeholder="নাম" class="border p-2 rounded">
          <input id="mPost" placeholder="পদবী - সভাপতি/সদস্য" class="border p-2 rounded">
          <input id="mPhone" placeholder="ফোন" class="border p-2 rounded">
          <input id="mImage" placeholder="ছবির লিংক" class="border p-2 rounded">
          <input id="mBlood" placeholder="রক্তের গ্রুপ" class="border p-2 rounded">
          <input id="mAddress" placeholder="ঠিকানা" class="border p-2 rounded">
        </div>
        <button onclick="addItem('members')" class="bg-teal-600 text-white px-6 py-2 rounded mb-4">সদস্য যোগ করুন</button>
        <div id="membersList"></div>
      </div>

      <!-- গ্যালারি -->
      <div id="gallery" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-4">গ্যালারি ম্যানেজ</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3">
          <input id="gTitle" placeholder="ছবির টাইটেল" class="border p-2 rounded">
          <input id="gImage" placeholder="ছবির লিংক" class="border p-2 rounded">
          <select id="gCategory" class="border p-2 rounded">
            <option value="মেডিকেল ক্যাম্প">মেডিকেল ক্যাম্প</option>
            <option value="শিক্ষা সহায়তা">শিক্ষা সহায়তা</option>
            <option value="ত্রাণ বিতরণ">ত্রাণ বিতরণ</option>
            <option value="অন্যান্য">অন্যান্য</option>
          </select>
          <input id="gDate" type="date" class="border p-2 rounded">
        </div>
        <button onclick="addItem('gallery')" class="bg-pink-600 text-white px-6 py-2 rounded mb-4">ছবি যোগ করুন</button>
        <div id="galleryList"></div>
      </div>

      <!-- নিউজ -->
      <div id="news" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-4">নিউজ ম্যানেজ</h2>
        <div class="grid grid-cols-1 gap-2 mb-3">
          <input id="nTitle" placeholder="নিউজের শিরোনাম" class="border p-2 rounded">
          <textarea id="nDetails" placeholder="বিস্তারিত" class="border p-2 rounded"></textarea>
          <input id="nDate" type="date" class="border p-2 rounded">
          <input id="nImage" placeholder="ছবির লিংক" class="border p-2 rounded">
        </div>
        <button onclick="addItem('news')" class="bg-indigo-600 text-white px-6 py-2 rounded mb-4">নিউজ যোগ করুন</button>
        <div id="newsList"></div>
      </div>

      <!-- সেটিংস -->
      <div id="settings" class="tab-content p-4">
        <h2 class="text-xl font-bold mb-4">ওয়েবসাইট সেটিংস</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mb-3">
          <input id="sName" placeholder="ফাউন্ডেশনের নাম" class="border p-2 rounded">
          <input id="sBkash" placeholder="বিকাশ নম্বর" class
