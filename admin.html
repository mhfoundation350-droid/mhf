<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHF Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
<div id="login" class="max-w-sm mx-auto bg-white p-6 rounded-lg shadow-md mt-20">
<h1 class="text-2xl font-bold text-center text-green-700 mb-4">মেঘনা হিউম্যানিটি ফাউন্ডেশন</h1>
<p class="text-center mb-4">Admin Login</p>
<input type="password" id="pass" placeholder="Password দিন" class="w-full p-3 border rounded mb-3">
<button onclick="login()" class="w-full bg-green-600 text-white p-3 rounded font-bold">Login করুন</button>
</div>

<div id="panel" class="hidden">
<div class="bg-green-700 text-white p-4">
  <div class="container mx-auto flex justify-between items-center">
    <h1 class="text-xl font-bold">MHF Admin Panel</h1>
    <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded text-sm">Logout</button>
  </div>
</div>

<div class="container mx-auto p-4">
  <!-- Tab Buttons -->
  <div class="flex gap-2 mb-6 flex-wrap">
    <button onclick="showTab('dashboard')" class="tab-btn bg-green-600 text-white px-4 py-2 rounded">ড্যাশবোর্ড</button>
    <button onclick="showTab('members')" class="tab-btn bg-gray-300 px-4 py-2 rounded">সদস্য</button>
    <button onclick="showTab('funds')" class="tab-btn bg-gray-300 px-4 py-2 rounded">ফান্ড</button>
    <button onclick="showTab('projects')" class="tab-btn bg-gray-300 px-4 py-2 rounded">প্রজেক্ট</button>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="tab-content">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-gray-500">বর্তমান ক্যাশ</h3>
        <p class="text-3xl font-bold text-green-600" id="total-cash">0 ৳</p>
      </div>
      <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-gray-500">মোট সদস্য</h3>
        <p class="text-3xl font-bold text-blue-600" id="total-members">0</p>
      </div>
      <div class="bg-white p-6 rounded-lg shadow">
        <h3 class="text-gray-500">মোট প্রজেক্ট</h3>
        <p class="text-3xl font-bold text-orange-600" id="total-projects">0</p>
      </div>
    </div>
  </div>

  <!-- Members -->
  <div id="members" class="tab-content hidden">
    <div class="bg-white p-6 rounded-lg shadow-md mb-6">
      <h2 class="text-xl font-bold mb-4">নতুন সদস্য যোগ করুন</h2>
      <input type="text" id="m-name" placeholder="সদস্যের নাম" class="w-full p-3 border rounded mb-3">
      <input type="text" id="m-role" placeholder="পদবি" class="w-full p-3 border rounded mb-3">
      <input type="file" id="m-image" accept="image/*" class="w-full p-3 border rounded mb-3">
      <button onclick="addMember()" class="w-full bg-green-600 text-white p-3 rounded font-bold">যোগ করুন</button>
    </div>
    <div class="bg-white p-6 rounded-lg shadow-md">
      <h2 class="text-xl font-bold mb-4">সদস্য লিস্ট</h2>
      <div id="members-list"></div>
    </div>
  </div>

  <!-- Funds
