<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Meghna Humanity Foundation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body{font-family:'Hind Siliguri',sans-serif}
        .modal{display:none;position:fixed;z-index:100;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.5)}
        .modal-content{background:white;margin:5% auto;padding:20px;border-radius:8px;width:90%;max-width:500px}
    </style>
</head>
<body class="bg-gray-100">
    <!-- Login Section -->
    <div id="login-section" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-lg w-96">
            <h2 class="text-2xl font-bold text-center mb-6 text-green-600">MHF Admin Login</h2>
            <input type="password" id="password" placeholder="Password দিন" class="w-full border p-3 rounded mb-4 focus:outline-green-600">
            <button onclick="login()" class="w-full bg-green-600 text-white p-3 rounded font-bold hover:bg-green-700">Login করুন</button>
            <p class="text-xs text-gray-500 mt-3 text-center">Default Password: admin123</p>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="hidden">
        <header class="bg-green-600 text-white p-4 shadow-md">
            <div class="container mx-auto flex justify-between
