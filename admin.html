<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHF Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div id="login" class="min-h-screen flex items-center justify-center">
<div class="bg-white p-8 rounded-lg shadow-md w-96">
<h1 class="text-2xl font-bold text-center text-green-700 mb-6">MHF Admin Login</h1>
<input type="password" id="pass" placeholder="Password দিন" class="w-full p-3 border rounded mb-4">
<button onclick="checkLogin()" class="w-full bg-green-600 text-white p-3 rounded font-bold">Login করুন</button>
<p class="text-center text-sm mt-4 text-gray-500">Password: mhf2024</p>
</div>
</div>

<div id="panel" class="hidden p-6">
<div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow-md">
<h1 class="text-2xl font-bold text-green-700 mb-6">সদস্য যোগ করুন</h1>
<input type="text" id="name" placeholder="নাম" class="w-full p-3 border rounded mb-3">
<input type="text" id="role" placeholder="পদবি" class="w-full p-3 border rounded mb-3">
<input type="file" id="image" accept="image/*" class="w-full p-3 border rounded mb-3">
<button onclick="saveToken()" class="w-full bg-blue-600 text-white p-3 rounded font-bold mb-3">1. Token সেট করুন</button>
<button onclick="addMember()" class="w-full bg-green-600 text-white p-3 rounded font-bold">2. সদস্য যোগ করুন</button>
<p id="msg" class="text-center mt-4"></p>
</div>
</div>

<script>
let token = localStorage.getItem('gh_token') || '';
function checkLogin(){
  if(document.getElementById('pass').value === 'mhf2024'){
    document.getElementById('login').classList.add('hidden');
    document.getElementById('panel').classList.remove('hidden');
  } else {
    alert('Password ভুল!');
  }
}
function saveToken(){
  token = prompt('GitHub Token পেস্ট করুন:');
  if(token){
    localStorage.setItem('gh_token', token);
    document.getElementById('msg').innerHTML = '<span class="text-green-600">Token সেভ হয়েছে ✅</span>';
  }
}
function addMember(){
  if(!token){ alert('আগে Token সেট করুন'); return; }
  document.getElementById('msg').innerHTML = '<span class="text-blue-600">সেভ হচ্ছে...</span>';
  // এখানে GitHub API কোড বসবে। আপাতত টেস্ট
  setTimeout(()=>{
    document.getElementById('msg').innerHTML = '<span class="text-green-600">সফল! 1-2 মিনিট পর সাইটে দেখুন ✅</span>';
  },1000);
}
</script>
</body>
</html>
