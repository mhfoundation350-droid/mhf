<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHF নবনির্বাচিত অভিনন্দন কার্ড</title>
<style>
@import url('https://fonts.maateen.me/solaiman-lipi/font.css');
@import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
body{font-family:'Hind Siliguri','SolaimanLipi',sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);padding:20px;margin:0;color:#fff;min-height:100vh}
.box{max-width:480px;margin:auto;background:rgba(255,255,255,0.97);color:#333;padding:30px;border-radius:30px;box-shadow:0 25px 70px rgba(0,0,0,0.5)}
h2{text-align:center;color:#0f2027;margin-bottom:20px;font-size:24px;line-height:1.4}
input{width:100%;padding:14px;margin:10px 0;border:2px solid #e0e0e0;border-radius:14px;font-size:17px;font-family:'Hind Siliguri','SolaimanLipi';box-sizing:border-box}
input:focus{border-color:#FFD700;outline:none;box-shadow:0 0 10px rgba(255,215,0,0.3)}
button{width:100%;padding:18px;background:linear-gradient(90deg,#FFD700,#FFA500);color:#0f2027;border:none;border-radius:14px;font-size:19px;font-weight:bold;cursor:pointer;margin-top:15px}
button:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(255,215,0,0.4)}
button:disabled{background:#ccc;cursor:not-allowed}
canvas{max-width:100%;border-radius:25px;margin-top:25px;display:none;box-shadow:0 15px 50px rgba(0,0,0,0.4)}
.label{font-size:14px;color:#666;margin-top:5px;margin-bottom:-5px}
#downloadBtn{display:none;background:linear-gradient(90deg,#28a745,#20c997)}
</style>
</head>
<body>
<div class="box">
<h2>🌿 মেঘনা হিউম্যানিটি ফাউন্ডেশন 🌿<br><span style="font-size:18px;color:#FF8C00">নবনির্বাচিত অভিনন্দন কার্ড</span></h2>
<input type="file" id="photo" accept="image/*">
<p class="label">সদস্যের ছবি আপলোড করুন</p>
<input type="text" id="name" placeholder="পূর্ণ নাম লিখুন">
<input type="text" id="designation" placeholder="নির্বাচিত পদবি লিখুন">
<button id="genBtn" onclick="makeCard()">✨ অভিনন্দন কার্ড জেনারেট করুন</button>
<button id="downloadBtn" onclick="downloadCard()">⬇️ কার্ড ডাউনলোড করুন</button>
<canvas id="canvas" width="1080" height="1480"></canvas>
</div>

<script>
let generatedImage = null;

function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
  let rot = Math.PI / 2 * 3;
  let x = cx;
  let y = cy;
  let step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerRadius);
  for (let i = 0; i < spikes; i++) {
    x = cx + Math.cos(rot) * outerRadius;
    y = cy + Math.sin(rot) * outerRadius;
    ctx.lineTo(x, y);
    rot += step;
    x = cx + Math.cos(rot) * innerRadius;
    y = cy + Math.sin(rot) * innerRadius;
    ctx.lineTo(x, y);
    rot += step;
  }
  ctx.lineTo(cx, cy - outerRadius);
  ctx.closePath();
}

function makeCard(){
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const photo=document.getElementById('photo').files[0];
const name=document.getElementById('name').value;
const desig=document.getElementById('designation').value;

if(!photo||!name||!desig){alert("ছবি, নাম, পদবি অবশ্যই দিতে হবে ভাই");return}

document.getElementById('genBtn').innerText = '⏳ জেনারেট হচ্ছে...';
document.getElementById('genBtn').disabled = true;

// ব্যাকগ্রাউন্ড
let grad=ctx.createLinearGradient(0,0,0,1480);
grad.addColorStop(0,'#1e3c72'); grad.addColorStop(0.5,'#2a5298'); grad.addColorStop(1,'#0f2027');
ctx.fillStyle=grad; ctx.fillRect(0,0,1080,1480);

// গোল্ডেন বর্ডার
ctx.strokeStyle='#FFD700'; ctx.lineWidth=8;
roundRect(ctx,20,20,1040,1440,40); ctx.stroke();
ctx.strokeStyle='rgba(255,215,0,0.3)'; ctx.lineWidth=3;
roundRect(ctx,35,35,1010,1410,35); ctx.stroke();

// হেডার
ctx.fillStyle='rgba(255,255,255,0.98)';
roundRect(ctx,60,60,960,140,25); ctx.fill();

// MHF লোগো
ctx.fillStyle='#FFD700'; ctx.beginPath(); ctx.arc(160,130,60,0,Math.PI*2); ctx.fill();
ctx.fillStyle='#1e3c72'; ctx.font='bold 50px Hind Siliguri'; ctx.textAlign='center';
ctx.fillText('MHF',160,148);

ctx.fillStyle='#1e3c72'; ctx.font='bold 44px Hind Siliguri';
ctx.fillText('মেঘনা হিউম্যানিটি ফাউন্ডেশন',600,120);
ctx.font='28px Hind Siliguri'; ctx.fillStyle='#FF8C00';
ctx.fillText('"সেবা ও মমতায় উজ্জ্বল আগামী"',600,165);

// ২ পাশে গোল্ডেন স্টার + লাইট রে ডেকোরেশন
ctx.save();
ctx.globalAlpha=0.6;
ctx.fillStyle='#FFD700';
ctx.shadowColor='#FFD700'; ctx.shadowBlur=15;

// বাম পাশে স্টার
drawStar(ctx,180,350,5,25,12); ctx.fill();
drawStar(ctx,220,480,5,18,9); ctx.fill();
drawStar(ctx,150,520,5,22,11); ctx.fill();

// ডান পাশে স্টার
drawStar(ctx,900,360,5,25,12); ctx.fill();
drawStar(ctx,860,470,5,18,9); ctx.fill();
drawStar(ctx,930,530,5,22,11); ctx.fill();

// লাইট রে
ctx.globalAlpha=0.3;
ctx.strokeStyle='#FFD700'; ctx.lineWidth=2;
for(let i=0;i<5;i++){
  ctx.beginPath();
  ctx.moveTo(300+i*15, 320+i*10);
  ctx.lineTo(360, 420);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(780-i*15, 330+i*10);
  ctx.lineTo(720, 420);
  ctx.stroke();
}
ctx.shadowBlur=0;
ctx.globalAlpha=1;
ctx.restore();

const img=new Image();
img.onload=function(){
// ছবি - 360px বড়
ctx.save(); ctx.shadowColor='#FFD700'; ctx.shadowBlur=25;
ctx.beginPath(); ctx.arc(540,410,180,0,Math.PI*2); ctx.closePath(); ctx.clip();
ctx.drawImage(img,360,230,360,360); ctx.restore();
ctx.shadowBlur=0;
ctx.strokeStyle='#FFD700'; ctx.lineWidth=12; ctx.beginPath(); ctx.arc(540,410,180,0,Math.PI*2); ctx.stroke();

// নামের বক্স - শুধু নামের জন্য গোল্ডেন বর্ডার
ctx.fillStyle='rgba(255,255,255,0.15)';
roundRect(ctx,140,620,800,80,20); ctx.fill();
ctx.strokeStyle='#FFD700'; ctx.lineWidth=5;
roundRect(ctx,140,620,800,80,20); ctx.stroke();
ctx.fillStyle='#FFD700'; ctx.font='bold 52px Hind Siliguri';
ctx.fillText(name,540,675);

// পদবির বক্স - শুধু পদবির জন্য নীল বর্ডার
ctx.fillStyle='rgba(56,189,248,0.15)';
roundRect(ctx,190,720,700,70,20); ctx.fill();
ctx.strokeStyle='#38bdf8'; ctx.lineWidth=5;
roundRect(ctx,190,720,700,70,20); ctx.stroke();
ctx.fillStyle='#38bdf8'; ctx.font='bold 38px Hind Siliguri';
ctx.fillText(desig,540,765);

// মেইন টেক্সট বক্স
ctx.fillStyle='rgba(255,255,255,0.95)';
roundRect(ctx,80,830,920,500,30); ctx.fill();

// লেখা
ctx.textAlign='center';
const lines=[
{txt:'মেঘনা হিউম্যানিটি ফাউন্ডেশনের নবনির্বাচিত', color:'#1e3c72', size:26},
{txt:'পদে নির্বাচিত হওয়ায় আপনাকে জানাই', color:'#1e3c72', size:26},
{txt:'আন্তরিক শুভেচ্ছা ও প্রাণঢালা অভিনন্দন।', color:'#dc2626', size:28, bold:true},
{txt:'', color:'#000', size:8},
{txt:'আপনার মেধা, সততা ও মানবিক মূল্যবোধের মাধ্যমে', color:'#0a192f', size:24},
{txt:'সংগঠনের সেবা কার্যক্রম আরও সমৃদ্ধ ও গতিশীল হবে—', color:'#0a192f', size:24},
{txt:'এই প্রত্যাশা করি।', color:'#059669', size:25, bold:true},
{txt:'', color:'#000', size:8},
{txt:'মানবতার কল্যাণে আপনার পথচলা হোক সফল,', color:'#7c3aed', size:24},
{txt:'উজ্জ্বল ও গৌরবময়। সমাজসেবা ও মানুষের পাশে', color:'#7c3aed', size:24},
{txt:'থাকার এই মহৎ দায়িত্ব পালনে মহান আল্লাহ তায়ালা', color:'#1e3c72', size:24},
{txt:'আপনাকে সুস্বাস্থ্য, প্রজ্ঞা ও সফলতা দান করুন।', color:'#ea580c', size:25, bold:true},
{txt:'', color:'#000', size:8},
{txt:'আপনার নেতৃত্বে এগিয়ে যাক মানবতার জয়যাত্রা।', color:'#dc2626', size:27, bold:true}
];

let y=890;
lines.forEach(line=>{
ctx.fillStyle=line.color;
ctx.font=(line.bold?'bold ':'') + line.size + 'px Hind Siliguri';
ctx.fillText(line.txt,540,y);
y+=line.size+4;
});

// ফুটার
ctx.fillStyle='rgba(0,0,0,0.85)';
roundRect(ctx,60,1350,960,110,25); ctx.fill();
ctx.fillStyle='#FFD700'; ctx.font='bold 26px Hind Siliguri';
ctx.fillText('✨ শুভকামনায়',540,1390);
ctx.font='bold 24px Hind Siliguri'; ctx.fillStyle='#90EE90';
ctx.fillText('মেঘনা হিউম্যানিটি ফাউন্ডেশন',540,1425);
ctx.font='20px Hind Siliguri'; ctx.fillStyle='#fff';
ctx.fillText('স্থাপিত: ২০২৬ ইং | উপজেলা সংলগ্ন রোড, কমলনগর, লক্ষ্মীপুর',540,1455);

canvas.style.display='block';
generatedImage = canvas.toDataURL('image/png');
document.getElementById('downloadBtn').style.display='block';
document.getElementById('genBtn').innerText = '✅ কার্ড রেডি';
document.getElementById('genBtn').disabled = false;
}
img.src=URL.createObjectURL(photo);
}

function downloadCard(){
if(!generatedImage){alert("আগে কার্ড জেনারেট করুন");return}
let link=document.createElement('a');
let name=document.getElementById('name').value || 'MHF_Member';
link.download=name+'_MHF_Congratulations.png';
link.href=generatedImage;
link.click();
}

function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
</script>
</body>
</html>
