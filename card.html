<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHF ফটোকার্ড মেকার</title>
<style>
@import url('https://fonts.maateen.me/solaiman-lipi/font.css');
body{font-family:'SolaimanLipi',sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);padding:20px;margin:0;color:#fff}
.box{max-width:500px;margin:auto;background:#fff;color:#333;padding:25px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
h2{text-align:center;color:#1e3c72;margin-bottom:20px}
input,select{width:100%;padding:12px;margin:8px 0;border:2px solid #ddd;border-radius:10px;font-size:16px;font-family:'SolaimanLipi'}
input[type=file]{padding:8px}
button{width:100%;padding:15px;background:linear-gradient(90deg,#ff416c,#ff4b2b);color:#fff;border:none;border-radius:10px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:10px}
button:hover{opacity:0.9}
canvas{max-width:100%;border-radius:15px;margin-top:20px;display:none;box-shadow:0 5px 20px rgba(0,0,0,0.2)}
.note{font-size:13px;color:#666;margin-top:10px}
</style>
</head>
<body>
<div class="box">
<h2>মেঘনা হিউম্যানিটি ফাউন্ডেশন<br>ফটোকার্ড মেকার</h2>
<input type="file" id="photo" accept="image/*">
<input type="text" id="name" placeholder="নাম লিখুন - যেমন: মোঃ রহিম">
<input type="text" id="nameEn" placeholder="Name in English - Md Rahim">
<select id="designation">
<option>পদবি সিলেক্ট করুন</option>
<option>প্রতিষ্ঠাতা সভাপতি</option>
<option>সভাপতি</option>
<option>সহ-সভাপতি</option>
<option>সাধারণ সম্পাদক</option>
<option>যুগ্ম সাধারণ সম্পাদক</option>
<option>সাংগঠনিক সম্পাদক</option>
<option>কোষাধ্যক্ষ</option>
<option>সদস্য</option>
</select>
<button onclick="makeCard()">কার্ড বানাও + ডাউনলোড</button>
<canvas id="canvas" width="1080" height="1350"></canvas>
<p class="note">টিপস: ছবি স্কয়ার হলে বেস্ট দেখাবে। কার্ড ডাউনলোড হয়ে যাবে অটো।</p>
</div>

<script>
function makeCard(){
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const photo=document.getElementById('photo').files[0];
const name=document.getElementById('name').value;
const nameEn=document.getElementById('nameEn').value;
const desig=document.getElementById('designation').value;

if(!photo||!name||desig=="পদবি সিলেক্ট করুন"){alert("সব ঘর পূরণ করো ভাই");return}

// Background gradient
let grad=ctx.createLinearGradient(0,0,0,1350);
grad.addColorStop(0,'#87CEEB'); grad.addColorStop(1,'#228B22');
ctx.fillStyle=grad; ctx.fillRect(0,0,1080,1350);

// Header
ctx.fillStyle='rgba(255,255,255,0.95)';
ctx.fillRect(0,0,1080,200);
ctx.fillStyle='#1e3c72'; ctx.font='bold 55px SolaimanLipi';
ctx.textAlign='center'; ctx.fillText('মেঘনা হিউম্যানিটি ফাউন্ডেশন',540,90);
ctx.font='35px SolaimanLipi'; ctx.fillStyle='#ff4b2b';
ctx.fillText('Meghna Humanity Foundation',540,150);
ctx.font='28px SolaimanLipi'; ctx.fillStyle='#228B22';
ctx.fillText('"সেবা ও মমতায় উজ্জ্বল আগামী"',540,185);

// Photo circle
const img=new Image();
img.onload=function(){
ctx.save(); ctx.beginPath(); ctx.arc(540,500,220,0,Math.PI*2); ctx.closePath(); ctx.clip();
ctx.drawImage(img,320,280,440,440); ctx.restore();
ctx.strokeStyle='#FFD700'; ctx.lineWidth=12; ctx.beginPath(); ctx.arc(540,500,220,0,Math.PI*2); ctx.stroke();

// Name
ctx.fillStyle='#fff'; ctx.font='bold 65px SolaimanLipi'; ctx.fillText(name,540,850);
ctx.font='40px SolaimanLipi'; ctx.fillStyle='#FFE4B5'; ctx.fillText(nameEn,540,920);

// Designation box
let gradBox=ctx.createLinearGradient(200,980,880,1100);
gradBox.addColorStop(0,'#ff416c'); gradBox.addColorStop(1,'#ff4b2b');
ctx.fillStyle=gradBox; roundRect(ctx,200,980,680,120,20); ctx.fill();
ctx.fillStyle='#fff'; ctx.font='bold 50px SolaimanLipi'; ctx.fillText(desig,540,1055);

// Footer
ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,1220,1080,130);
ctx.fillStyle='#fff'; ctx.font='32px SolaimanLipi';
ctx.fillText('উপজেলা সংলগ্ন রোড, কমলনগর, লক্ষ্মীপুর',540,1270);
ctx.font='28px SolaimanLipi'; ctx.fillStyle='#90EE90';
ctx.fillText('মেঘনা হিউম্যানিটি ফাউন্ডেশন',540,1310);

canvas.style.display='block';
// Download
let link=document.createElement('a');
link.download=name+'_MHF_Card.png';
link.href=canvas.toDataURL();
link.click();
}
img.src=URL.createObjectURL(photo);
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
</script>
</body>
</html>
