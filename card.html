<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MHF এক্সিকিউটিভ কার্ড</title>
<style>
@import url('https://fonts.maateen.me/solaiman-lipi/font.css');
body{font-family:'SolaimanLipi',sans-serif;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);padding:20px;margin:0;color:#fff;min-height:100vh}
.box{max-width:480px;margin:auto;background:rgba(255,255,255,0.97);color:#333;padding:30px;border-radius:30px;box-shadow:0 25px 70px rgba(0,0,0,0.5);backdrop-filter:blur(15px)}
h2{text-align:center;color:#0f2027;margin-bottom:20px;font-size:26px;line-height:1.4}
input{width:100%;padding:14px;margin:10px 0;border:2px solid #e0e0e0;border-radius:14px;font-size:17px;font-family:'SolaimanLipi';transition:0.3s;box-sizing:border-box}
input:focus{border-color:#FFD700;outline:none;box-shadow:0 0 10px rgba(255,215,0,0.3)}
button{width:100%;padding:18px;background:linear-gradient(90deg,#FFD700,#FFA500);color:#0f2027;border:none;border-radius:14px;font-size:19px;font-weight:bold;cursor:pointer;margin-top:15px;transition:0.3s}
button:hover{transform:translateY(-2px);box-shadow:0 10px 25px rgba(255,215,0,0.4)}
canvas{max-width:100%;border-radius:25px;margin-top:25px;display:none;box-shadow:0 15px 50px rgba(0,0,0,0.4)}
.label{font-size:14px;color:#666;margin-top:5px;margin-bottom:-5px}
</style>
</head>
<body>
<div class="box">
<h2>মেঘনা হিউম্যানিটি ফাউন্ডেশন<br><span style="font-size:18px;color:#FF8C00">এক্সিকিউটিভ ফটোকার্ড</span></h2>
<input type="file" id="photo" accept="image/*">
<p class="label">মেম্বারের ছবি আপলোড করুন</p>
<input type="text" id="name" placeholder="পূর্ণ নাম লিখুন">
<p class="label">যেমন: মোহাম্মদ আলী আজগর</p>
<input type="text" id="designation" placeholder="পদবি লিখুন">
<p class="label">যেমন: সাধারণ সম্পাদক, সদস্য, কোষাধ্যক্ষ</p>
<input type="text" id="blood" placeholder="রক্তের গ্রুপ">
<input type="text" id="join" placeholder="যোগদান সাল">
<button onclick="makeCard()">✨ কার্ড জেনারেট করুন</button>
<canvas id="canvas" width="1080" height="1650"></canvas>
</div>

<script>
function makeCard(){
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const photo=document.getElementById('photo').files[0];
const name=document.getElementById('name').value;
const desig=document.getElementById('designation').value;
const blood=document.getElementById('blood').value;
const join=document.getElementById('join').value;

if(!photo||!name||!desig){alert("ছবি, নাম, পদবি অবশ্যই দিতে হবে ভাই");return}

// Premium gradient background
let grad=ctx.createLinearGradient(0,0,0,1650);
grad.addColorStop(0,'#1e3c72'); grad.addColorStop(0.3,'#2a5298'); grad.addColorStop(0.7,'#1a4d8f'); grad.addColorStop(1,'#0f2027');
ctx.fillStyle=grad; ctx.fillRect(0,0,1080,1650);

// Glass overlay pattern
ctx.fillStyle='rgba(255,255,255,0.03)';
for(let i=0;i<12;i++){ctx.fillRect(0,i*137,1080,60)}

// Top header with fixed logo
ctx.fillStyle='rgba(255,255,255,0.99)';
roundRect(ctx,35,35,1010,200,30); ctx.fill();

// Your MHF Logo - embedded
const logoImg=new Image();
logoImg.src='data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD...'; // তোমার লোগো বেস64 এ কনভার্ট করে বসাবো
logoImg.onload=function(){
ctx.save(); ctx.beginPath(); ctx.arc(150,135,80,0,Math.PI*2); ctx.clip();
ctx.drawImage(logoImg,70,55,160,160); ctx.restore();
ctx.strokeStyle='#FFD700'; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(150,135,80,0,Math.PI*2); ctx.stroke();
}

ctx.fillStyle='#1e3c72'; ctx.font='bold 52px SolaimanLipi'; ctx.textAlign='center';
ctx.fillText('মেঘনা হিউম্যানিটি ফাউন্ডেশন',570,115);
ctx.font='34px SolaimanLipi'; ctx.fillStyle='#FF8C00';
ctx.fillText('"সেবা ও মমতায় উজ্জ্বল আগামী"',570,165);

// Greeting
ctx.fillStyle='#FFD700'; ctx.font='italic 36px SolaimanLipi';
ctx.fillText('শুভেচ্ছান্তে',540,280);

// Photo with triple border
const img=new Image();
img.onload=function(){
ctx.save(); ctx.beginPath(); ctx.arc(540,600,210,0,Math.PI*2); ctx.closePath(); ctx.clip();
ctx.drawImage(img,330,390,420,420); ctx.restore();
ctx.strokeStyle='#FFD700'; ctx.lineWidth=12; ctx.beginPath(); ctx.arc(540,600,210,0,Math.PI*2); ctx.stroke();
ctx.strokeStyle='#fff'; ctx.lineWidth=6; ctx.beginPath(); ctx.arc(540,600,222,0,Math.PI*2); ctx.stroke();
ctx.strokeStyle='#FFD700'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(540,600,228,0,Math.PI*2); ctx.stroke();

// Name
ctx.fillStyle='#fff'; ctx.font='bold 66px SolaimanLipi'; ctx.fillText(name,540,920);

// Designation premium golden box
let gradBox=ctx.createLinearGradient(150,1000,930,1160);
gradBox.addColorStop(0,'#FFD700'); gradBox.addColorStop(0.5,'#FFA500'); gradBox.addColorStop(1,'#FF8C00');
ctx.fillStyle=gradBox; roundRect(ctx,150,1000,780,160,30); ctx.fill();
ctx.fillStyle='#0f2027'; ctx.font='bold 52px SolaimanLipi'; ctx.fillText(desig,540,1100);

// Info box
ctx.fillStyle='rgba(255,255,255,0.95)';
roundRect(ctx,120,1220,840,130,25); ctx.fill();
ctx.fillStyle='#1e3c72'; ctx.font='38px SolaimanLipi';
ctx.fillText('রক্তের গ্রুপ: '+blood+' | যোগদান: '+join,540,1295);

// Bottom footer
ctx.fillStyle='rgba(0,0,0,0.85)';
roundRect(ctx,35,1430,1010,185,30); ctx.fill();
ctx.fillStyle='#FFD700'; ctx.font='34px SolaimanLipi';
ctx.fillText('উপজেলা সংলগ্ন রোড, কমলনগর, লক্ষ্মীপুর',540,1490);
ctx.font='30px SolaimanLipi'; ctx.fillStyle='#90EE90';
ctx.fillText('মেঘনা হিউম্যানিটি ফাউন্ডেশন',540,1540);
ctx.font='26px SolaimanLipi'; ctx.fillStyle='#fff';
ctx.fillText('স্থাপিত: ২০২৬ ইং',540,1585);

canvas.style.display='block';
let link=document.createElement('a');
link.download=name+'_MHF_Card.png';
link.href=canvas.toDataURL();
link.click();
}
img.src=URL.createObjectURL(photo);
}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
</script>
</body>
</html>
