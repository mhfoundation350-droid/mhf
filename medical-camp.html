<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ফ্রি মেডিকেল ক্যাম্প - MHF</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
<nav class="bg-emerald-700 text-white shadow-lg sticky top-0 z-50">
  <div class="container mx-auto px-4 py-3 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <img src="images/logo.png" class="h-12 w-12 rounded-full bg-white p-1" onerror="this.src='https://ui-avatars.com/api/?name=MHF&background=10b981&color=fff'">
      <h1 class="text-xl font-bold">মেঘনা হিউম্যানিটি ফাউন্ডেশন</h1>
    </div>
    <div class="hidden md:flex gap-6">
      <a href="index.html" class="hover:text-yellow-300">হোম</a>
      <a href="projects.html" class="hover:text-yellow-300">প্রজেক্ট</a>
      <a href="medical-camp.html" class="text-yellow-300">মেডিকেল ক্যাম্প</a>
      <a href="education.html" class="hover:text-yellow-300">শিক্ষা সহায়তা</a>
      <a href="report.html" class="hover:text-yellow-300">আয়-ব্যয়</a>
      <a href="donate.html" class="bg-yellow-400 text-black px-4 py-2 rounded font-bold">দান করুন</a>
    </div>
  </div>
</nav>

<section class="py-12">
  <div class="container mx-auto px-4">
    <h2 class="text-4xl font-bold text-center mb-10 text-emerald-700">আমাদের ফ্রি মেডিকেল ক্যাম্পসমূহ</h2>
    <div id="campList" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
  </div>
</section>

<footer class="bg-emerald-900 text-white py-8 mt-12">
  <div class="container mx-auto px-4 text-center">
    <p>© 2024 মেঘনা হিউম্যানিটি ফাউন্ডেশন। সর্বস্বত্ব সংরক্ষিত।</p>
  </div>
</footer>

<script>
async function loadCamps() {
  let camps = await fetch('data/medical-camps.json').then(r=>r.json());
  let html = '';
  camps.forEach(c => {
    html += `<div class="bg-white rounded-xl shadow-lg overflow-hidden">
      <img src="${c.image||'https://via.placeholder.com/600x400?text=Medical+Camp'}" class="w-full h-64 object-cover">
      <div class="p-6">
        <h3 class="text-2xl font-bold mb-3 text-emerald-700">${c.title}</h3>
        <p class="text-gray-600 mb-2"><i class="fas fa-calendar text-emerald-600"></i> ${c.date}</p>
        <p class="text-gray-600 mb-2"><i class="fas fa-location-dot text-emerald-600"></i> ${c.location}</p>
        <p class="text-gray-600 mb-4"><i class="fas fa-user-doctor text-emerald-600"></i> ডাঃ ${c.doctor}</p>
        <p class="text-gray-700 mb-4">${c.details||''}</p>
        <div class="bg-emerald-50 p-3 rounded-lg font-bold text-emerald-700">
          <i class="fas fa-users"></i> মোট সেবা পেয়েছেন: ${c.patient} জন
        </div>
      </div>
    </div>`;
  });
  document.getElementById('campList').innerHTML = html || '<p class="text-center col-span-2">কোনো ক্যাম্পের তথ্য নেই</p>';
}
loadCamps();
</script>
</body>
</html>
