<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'SolaimanLipi', sans-serif; }</style>
</head>
<body class="bg-gray-50">
  <header class="bg-blue-700 text-white p-4">
    <div class="container mx-auto flex justify-between items-center">
      <h1 id="siteName" class="text-2xl font-bold">মেঘনা হিউম্যানিটি ফাউন্ডেশন</h1>
      <nav class="space-x-4">
        <a href="index.html">হোম</a>
        <a href="about.html">আমাদের সম্পর্কে</a>
        <a href="medical-camp.html" class="font-bold">মেডিকেল ক্যাম্প</a>
        <a href="education.html">শিক্ষা সহায়তা</a>
        <a href="contact.html">যোগাযোগ</a>
      </nav>
    </div>
  </header>

  <section class="py-12">
    <div class="container mx-auto px-4">
      <h2 class="text-4xl font-bold text-center mb-8">ফ্রি মেডিকেল ক্যাম্পসমূহ</h2>
      <div id="campList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
  </section>

  <footer class="bg-gray-800 text-white py-8 mt-12">
    <div class="container mx-auto px-4 text-center">
      <p class="text-lg font-bold" id="footerName">মেঘনা হিউম্যানিটি ফাউন্ডেশন</p>
    </div>
  </footer>

<script>
const BASE_URL = 'https://raw.githubusercontent.com/mhfoundation350-droid/mhf/main/data/';
async function loadCamps() {
  const settings = await fetch(BASE_URL + 'settings.json').then(r => r.json());
  document.getElementById('siteName').textContent = settings.name;
  document.getElementById('footerName').textContent = settings.name;
  
  const camps = await fetch(BASE_URL + 'medical-camps.json').then(r => r.json());
  if(camps.length === 0){
    document.getElementById('campList').innerHTML = '<p class="text-center col-span-3 text-gray-500">কোন মেডিকেল ক্যাম্প নেই। Admin থেকে যোগ করুন।</p>';
    return;
  }
  document.getElementById('campList').innerHTML = camps.map(c => `
    <div class="bg-white p-6 rounded-xl shadow-lg border-l-4 border-teal-500">
      <h3 class="text-2xl font-bold text-teal-600 mb-3">${c.title}</h3>
      <p class="text-gray-600 mb-2"><b>📅 তারিখ:</b> ${c.date}</p>
      <p class="text-gray-600 mb-2"><b>
