<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MHF - Muslim's Helping Foundation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f8f9fa; }
    .header { background: #1a5f3f; color: white; padding: 20px; text-align: center; }
    .header h1 { font-size: 28px; }
    .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
    .card { background: white; padding: 20px; margin: 15px 0; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
    .card h2 { color: #1a5f3f; margin-bottom: 10px; }
    .number { font-size: 36px; font-weight: bold; color: #1a5f3f; }
    .donate-btn { background: #28a745; color: white; padding: 15px 30px; border: none; border-radius: 8px; font-size: 18px; margin: 10px 5px; cursor: pointer; }
    .donate-btn:hover { background: #218838; }
    .payment-info { background: #e8f5e9; padding: 15px; border-radius: 8px; margin-top: 15px; }
    .payment-info p { margin: 8px 0; font-size: 16px; }
    .footer { text-align: center; padding: 20px; color: #666; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Muslim's Helping Foundation</h1>
    <p>এতিম শিশুদের সাহায্যে এগিয়ে আসুন</p>
  </div>
  <div class="container">
    <div class="card">
      <h2>মোট সংগ্রহ</h2>
      <div class="number" id="totalFund">0 টাকা</div>
    </div>
    <div class="card">
      <h2>সাহায্যপ্রাপ্ত বাচ্চা</h2>
      <div class="number" id="totalKids">0 জন</div>
    </div>
    <div class="card">
      <h2>মোট খরচ</h2>
      <div class="number" id="totalExpense">0 টাকা</div>
    </div>
    <div class="card">
      <h2>ডোনেট করুন</h2>
      <button class="donate-btn" onclick="showBkash()">বিকাশে ডোনেট</button>
      <button class="donate-btn" onclick="showNagad()">নগদে ডোনেট</button>
      <div class="payment-info" id="paymentInfo" style="display:none;">
        <p><b>নাম্বার:</b> <span id="payNumber"></span></p>
        <p><b>রেফারেন্স:</b> MHF Donation</p>
        <p>Send Money করার পর স্ক্রিনশট পাঠান</p>
      </div>
    </div>
  </div>
  <div class="footer">
    <p>© 2026 Muslim's Helping Foundation</p>
  </div>
  <script>
    function loadData() {
      const data = JSON.parse(localStorage.getItem('mhfData') || '{}');
      document.getElementById('totalFund').innerText = (data.totalFund || 0) + ' টাকা';
      document.getElementById('totalKids').innerText = (data.totalKids || 0) + ' জন';
      document.getElementById('totalExpense').innerText = (data.totalExpense || 0) + ' টাকা';
      window.bkashNumber = data.bkashNumber || '01XXXXXXXXX';
      window.nagadNumber = data.nagadNumber || '01XXXXXXXXX';
    }
    function showBkash() {
      document.getElementById('paymentInfo').style.display = 'block';
      document.getElementById('payNumber').innerText = window.bkashNumber + ' (বিকাশ)';
    }
    function showNagad() {
      document.getElementById('paymentInfo').style.display = 'block';
      document.getElementById('payNumber').innerText = window.nagadNumber + ' (নগদ)';
    }
    loadData();
  </script>
</body>
</html>
