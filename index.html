<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মেঘনা হিউম্যানিটি ফাউন্ডেশন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans Bengali', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-green-700 text-white p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold">মেঘনা হিউম্যানিটি ফাউন্ডেশন</h1>
            <!-- Admin বাটন ডিলিট করে দিলাম। সাধারণ মানুষ দেখবে না -->
        </div>
    </header>

    <!-- Hero Section -->
    <section class="bg-green-600 text-white py-16 text-center">
        <div class="container mx-auto px-4">
            <h2 class="text-3xl md:text-4xl font-bold mb-4">মানবতার সেবায় আমরা অঙ্গীকারবদ্ধ</h2>
            <p class="text-lg">অসহায় মানুষের পাশে দাঁড়ানোই আমাদের মূল লক্ষ্য</p>
        </div>
    </section>

    <!-- Committee Section -->
    <section class="py-12 px-4">
        <div class="container mx-auto">
            <h2 class="text-3xl font-bold text-center text-green-700 mb-8">আমাদের কমিটি</h2>
            <div id="committee-list" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8 text-center">
        <p>&copy; 2024 মেঘনা হিউম্যানিটি ফাউন্ডেশন. সর্বস্বত্ব সংরক্ষিত।</p>
    </footer>

    <script>
    fetch('members.json?t='+Date.now()).then(r=>r.json()).then(members=>{
      document.getElementById('committee-list').innerHTML = members.length ? members.map(m=>`
        <div class="text-center bg-white p-4 rounded-lg shadow-lg hover:shadow-xl transition-shadow">
          <img src="${m.image}" class="w-24 h-24 rounded-full mx-auto object-cover mb-3 border-4 border-green-600">
          <h3 class="font-bold text-gray-800 text-lg">${m.name}</h3>
          <p class="text-sm text-green-700 font-semibold">${m.role}</p>
        </div>
      `).join('') : '<p class="text-center col-span-4 text-gray-500 py-8">এখনো কোনো সদস্য যোগ করা হয়নি</p>';
    }).catch(()=>{
      document.getElementById('committee-list').innerHTML = '<p class="text-center col-span-4 text-red-500">ডাটা লোড করতে সমস্যা হয়েছে</p>';
    });
    </script>
</body>
</html>
