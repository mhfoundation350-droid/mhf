<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>প্রজেক্ট সমূহ - মেঘনা হিউম্যানিটি ফাউন্ডেশন</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap');
    body { font-family: 'Noto Sans Bengali', sans-serif; }
    html { scroll-behavior: smooth; }
    .gradient-bg { background: linear-gradient(135deg, #16a34a 0%, #15803d 100%); }
    .nav-link { padding: 0.5rem 1rem; border-radius: 0.5rem; transition: 0.3s; }
    .nav-link:hover { background: rgba(255,255,255,0.2); }
    .nav-link.active { background: rgba(255,255,255,0.3); font-weight: bold; }
    .btn-primary { background: #16a34a; color: white; padding: 0.75rem 1.5rem; border-radius: 0.5rem; font-weight: bold; }
    .btn-primary:hover { background: #15803d; }
    .loading-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity:.5; } }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Navbar -->
  <nav class="gradient-bg text-white p-4 sticky top-0 z-50 shadow-lg">
    <div class="container mx-auto flex justify-between items-center">
      <div class="flex items-center gap-2">
        <img src="images/logo.png" alt="MHF Logo" class="w-9 h-9 rounded-full border-2 border-white flex-shrink-0">
        <h1 class="text-base md:text-2xl font-bold leading-tight whitespace-nowrap">মেঘনা হিউম্যানিটি ফাউন্ডেশন</h1>
      </div>
      <div class="hidden md:flex space-x-2">
        <a href="index.html" class="nav-link">হোম</a>
        <a href="about.html" class="nav-link">আমাদের সম্পর্কে</a>
        <a href="projects.html" class="nav-link active">প্রজেক্ট</a>
        <a href="report.html" class="nav-link">রিপোর্ট</a>
        <a href="gallery.html" class="nav-link">গ্যালারি</a>
        <a href="contact.html" class="nav-link">যোগাযোগ</a>
      </div>
      <button id="menuBtn" class="md:hidden flex-shrink-0"><i class="fas fa-bars text-2xl"></i></button>
    </div>
    <div id="mobileMenu" class="hidden md:hidden mt-4 space-y-2">
      <a href="index.html" class="block py-2">হোম</a>
      <a href="about.html" class="block py-2">আমাদের সম্পর্কে</a>
      <a href="projects.html" class="block py-2 font-bold">প্রজেক্ট</a>
      <a href="report.html" class="block py-2">রিপোর্ট</a>
      <a href="gallery.html" class="block py-2">গ্যালারি</a>
      <a href="contact.html" class="block py-2">যোগাযোগ</a>
    </div>
  </nav>

  <!-- Header -->
  <div class="gradient-bg text-white py-16 text-center">
    <h2 class="text-5xl font-bold">আমাদের প্রজেক্ট সমূহ</h2>
    <p class="text-xl mt-4 opacity-90">মানবতার সেবায় আমাদের চলমান কার্যক্রম</p>
  </div>

  <div class="container mx-auto px-4 py-16">
    <!-- Filter -->
    <div class="flex justify-center gap-4 mb-10 flex-wrap">
      <button onclick="filterProjects('all')" class="btn-primary">সব প্রজেক্ট</button>
      <button onclick="filterProjects('চলমান')" class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-700">চলমান</button>
      <button onclick="filterProjects('সম্পন্ন')" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-blue-700">সম্পন্ন</button>
    </div>

    <!-- Projects Grid -->
    <div id="projectsGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="text-center col-span-full text-gray-500 loading-pulse">প্রজেক্ট লোড হচ্ছে...</div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-green-900 text-white py-8 text-center">
    <p>&copy; 2026 মেঘনা হিউম্যানিটি ফাউন্ডেশন। সর্বস্বত্ব সংরক্ষিত।</p>
  </footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxM3ARqJFrR-joDhEFCLR91UJPkovun-U",
  authDomain: "mhf-foundation.firebaseapp.com",
  projectId: "mhf-foundation",
  storageBucket: "mhf-foundation.firebasestorage.app",
  messagingSenderId: "935003103652",
  appId: "1:935003103652:web:52e57da27fccf37c45e131"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let allProjects = [];

// Mobile Menu
document.getElementById('menuBtn').onclick = () => {
    document.getElementById('mobileMenu').classList.toggle('hidden');
}

// Load Projects
function loadProjects() {
    const q = query(collection(db, "projects"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snap) => {
        const projectsGrid = document.getElementById('projectsGrid');
        if (snap.empty) {
            projectsGrid.innerHTML = '<div class="text-center col-span-full text-gray-500">কোনো প্রজেক্ট যোগ করা হয়নি</div>';
            return;
        }
        
        allProjects = [];
        snap.forEach((doc) => {
            allProjects.push({ id: doc.id, ...doc.data() });
        });
        
        displayProjects(allProjects);
    });
}

// Display Projects
function displayProjects(projects) {
    const projectsGrid = document.getElementById('projectsGrid');
    if (projects.length === 0) {
        projectsGrid.innerHTML = '<div class="text-center col-span-full text-gray-500">কোনো প্রজেক্ট পাওয়া যায়নি</div>';
        return;
    }
    
    projectsGrid.innerHTML = '';
    projects.forEach((data) => {
        const statusColor = data.status === 'চলমান' ? 'bg-green-100 text-green-700' : 'bg-blue-100 text-blue-700';
        projectsGrid.innerHTML += `
        <div class="bg-white rounded-lg shadow-lg overflow-hidden hover:shadow-xl transition">
            <img src="${data.image}" class="w-full h-48 object-cover">
            <div class="p-5">
                <h3 class="font-bold text-xl mb-2">${data.name}</h3>
                <p class="text-sm text-gray-600 mb-4">${data.desc}</p>
                <div class="flex justify-between items-center">
                    <span class="inline-block px-3 py-1 rounded-full text-sm font-bold ${statusColor}">${data.status}</span>
                    ${data.budget ? `<span class="text-green-700 font-bold">বাজেট: ${data.budget}৳</span>` : ''}
                </div>
            </div>
        </div>`;
    });
}

// Filter Function
window.filterProjects = function(status) {
    if (status === 'all') {
        displayProjects(allProjects);
    } else {
        const filtered = allProjects.filter(p => p.status === status);
        displayProjects(filtered);
    }
}

loadProjects();
</script>
</body>
</html>
