<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>আমাদের টিম - মেঘনা হিউম্যানিটি ফাউন্ডেশন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap');
        body { font-family: 'Noto Sans Bengali', sans-serif; }
    </style>
</head>
<body class="bg-gray-50">

<!-- Navbar -->
<nav class="bg-green-700 text-white p-4 sticky top-0 z-50 shadow-lg">
    <div class="container mx-auto flex justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="images/logo.png" alt="MHF Logo" class="w-9 h-9 rounded-full border-2 border-white">
            <h1 class="text-base md:text-2xl font-bold">মেঘনা হিউম্যানিটি ফাউন্ডেশন</h1>
        </div>
        <a href="index.html" class="bg-yellow-400 text-green-900 px-4 py-2 rounded-full font-bold hover:bg-yellow-300">হোমে ফিরুন</a>
    </div>
</nav>

<!-- Committee Section -->
<section class="py-16">
    <div class="container mx-auto px-4">
        <h2 class="text-4xl font-bold text-center mb-10 text-green-700">আমাদের টিম</h2>
        <div id="team_cards" class="grid md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>
</section>

<!-- Footer -->
<footer class="bg-green-900 text-white py-10 text-center">
    <p>&copy; 2026 মেঘনা হিউম্যানিটি ফাউন্ডেশন। সর্বস্বত্ব সংরক্ষিত।</p>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBxM3ARqJFrR-joDhEFCLR91UJPkovun-U",
  authDomain: "mhf-foundation.firebaseapp.com",
  projectId: "mhf-foundation",
  storageBucket: "mhf-foundation.firebasestorage.app",
  messagingSenderId: "935003103652",
  appId: "1:935003103652:web:52e57da27fccf37c45e131"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Load Committee from Firebase
async function loadTeam() {
    try {
        const snap = await getDocs(collection(db, "committee"));
        const team_cards = document.getElementById('team_cards');
        team_cards.innerHTML = '';
        snap.forEach((doc) => {
            const data = doc.data();
            const whatsappLink = `https://wa.me/88${data.phone}?text=আসসালামু আলাইকুম, ${data.name} ভাই।`;
            team_cards.innerHTML += `
            <div class="bg-white p-4 rounded-lg shadow-lg text-center hover:shadow-xl transition">
                <img src="${data.image || 'images/default.jpg'}" class="w-32 h-32 object-cover rounded-full mx-auto mb-3 border-4 border-green-600">
                <h3 class="font-bold text-lg">${data.name}</h3>
                <p class="text-green-700 font-semibold mb-2">${data.post}</p>
                ${data.blood? `<p class="text-sm mb-3"><span class="bg-red-100 text-red-700 px-3 py-1 rounded-full font-bold">🩸 ${data.blood}</span></p>` : ''}
                <a href="${whatsappLink}" target="_blank" class="inline-flex items-center gap-2 bg-green-500 text-white px-4 py-2 rounded-full text-sm hover:bg-green-600">
                    <i class="fab fa-whatsapp text-lg"></i> ${data.phone}
                </a>
            </div>`;
        });
    } catch(e) { console.error(e); }
}
loadTeam();
</script>
</body>
</html>
